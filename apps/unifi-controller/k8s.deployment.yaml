apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-controller
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  labels:
    app.kubernetes.io/name: unifi-controller
spec:
  replicas: 1
  revisionHistoryLimit: 3
  # The config volume is ReadWriteOnce; a rolling update would let a second
  # pod attach it and write the same MongoDB data directory.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unifi-controller
    spec:
      nodeSelector:
        node-role/workload: zfs
      hostNetwork: true
      containers:
      - name: unifi-controller
        image: ghcr.io/linuxserver/unifi-controller:8.0.24
        env:
          - name: PUID
            value: "1000"
          - name: PGID
            value: "1000"
          - name: MEM_LIMIT
            value: "1024"
        resources:
          requests:
            cpu: 100m
            memory: 1792Mi
        volumeMounts:
          - name: config
            mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: longhorn-pvc-unifi-controller-config
