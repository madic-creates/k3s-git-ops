---
# Hourly Minecraft world backup via restic.
# Replaces the helm chart's in-pod mcbackup sidecar (versitygw S3 →
# Longhorn). Co-located with the minecraft pod via podAffinity because
# the Longhorn PVC is ReadWriteOnce.
#
# Unlike emby/nextpvr, the world is held open by a long-running JVM
# that writes region files in chunks. To guarantee an on-disk
# consistent snapshot the wrapper script tells Minecraft to flush
# via RCON (save-off + save-all flush) before invoking the shared
# backup.sh, and re-enables auto-save through an EXIT trap so a
# crashed backup cannot leave the server in save-off mode.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-minecraft
  namespace: minecraft
spec:
  # :15 slot. Mariadb (:10) skips 02-03 and finishes well within its
  # 9-minute deadline; grafana (:20) takes seconds. Minecraft's world
  # is small (<1 GB typically) so 540 s is comfortable headroom.
  schedule: "15 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 540
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-minecraft
            app.kubernetes.io/component: backup
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          # itzg/minecraft-server runs as UID 1000:1000, so world files
          # are 1000-owned. Match that to read everything without
          # depending on world-readable mode bits.
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/instance: minecraft-crossplay
                  namespaces:
                    - minecraft
                  topologyKey: kubernetes.io/hostname
          initContainers:
            # The minecraft-server image is already cached on the
            # target node (podAffinity co-locates with the live
            # minecraft pod) and ships rcon-cli at /usr/local/bin/.
            # Copying it into a shared tmpfs avoids carrying a separate
            # rcon image and keeps Renovate's per-tag updates trivial.
            - name: copy-rcon-cli
              image: ghcr.io/itzg/minecraft-server:2026.6.1-java21
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  cp /usr/local/bin/rcon-cli /tools/rcon-cli
                  chmod +x /tools/rcon-cli
              volumeMounts:
                - name: tools
                  mountPath: /tools
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
          containers:
            - name: restic
              image: ghcr.io/madic-creates/container-restic:latest@sha256:c5786cdded119d4bf44680e95f54a4cbb0f89ddb05eab83937709f0b6338a811
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  # Always re-enable auto-save on exit, even if the
                  # backup script fails. backup.sh's terminal
                  # 'exec sh -c "exit N"' only replaces the inner
                  # shell invoked by `sh /usr/local/bin/backup.sh`,
                  # so this outer trap still fires when that
                  # sub-shell exits.
                  trap '/tools/rcon-cli save-on || true' EXIT
                  /tools/rcon-cli save-off
                  /tools/rcon-cli save-all flush
                  # save-all returns before the JVM finishes flushing
                  # region files to disk; 5 s is enough headroom for
                  # the small worlds we host here.
                  sleep 5
                  sh /usr/local/bin/backup.sh
              env:
                - name: HOME
                  value: /home/restic
                - name: RCON_HOST
                  value: minecraft-crossplay-rcon.minecraft.svc.cluster.local
                - name: RCON_PORT
                  value: "25575"
                - name: RCON_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: minecraft-crossplay-rcon-secret
                      key: rcon-password
              envFrom:
                - secretRef:
                    name: backup-env-configuration-minecraft
              volumeMounts:
                - name: backup-script
                  mountPath: /usr/local/bin/backup.sh
                  subPath: backup.sh
                - name: minecraft-data
                  mountPath: /backup/minecraft
                  readOnly: true
                - name: tools
                  mountPath: /tools
                - name: home
                  mountPath: /home/restic
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
          volumes:
            - name: minecraft-data
              persistentVolumeClaim:
                claimName: minecraft-crossplay-datadir
            - name: backup-script
              configMap:
                name: crontab-backup-script
            - name: tools
              emptyDir:
                medium: Memory
                sizeLimit: 20Mi
            - name: home
              emptyDir:
                medium: Memory
                sizeLimit: 200Mi
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backup-minecraft
  namespace: minecraft
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: backup-minecraft
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: monitoring
            k8s:io.kubernetes.pod.namespace: monitoring
            k8s:app.kubernetes.io/name: prometheus-pushgateway
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
    # Local restic REST-server (primary backup target)
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: backup
            k8s:io.kubernetes.pod.namespace: backup
            k8s:app.kubernetes.io/name: rest-server
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # RCON to flush world saves before backup and re-enable auto-save
    # after. Same namespace; selector matches the minecraft pod's
    # chart label set by the helm template.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: minecraft
            k8s:app.kubernetes.io/instance: minecraft-crossplay
      toPorts:
        - ports:
            - port: "25575"
              protocol: TCP
    # ntfy notifications on failure
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
