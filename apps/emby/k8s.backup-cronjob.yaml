---
# Hourly Emby config backup via restic.
# Replaces the previous in-pod sidecar (crond + restic).
# Co-located with the Emby pod via podAffinity because the Longhorn
# PVC is ReadWriteOnce.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-emby
  namespace: media
spec:
  schedule: "30 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 540
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-emby
            app.kubernetes.io/component: backup
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          # Emby is configured with UID=0/GID=0 in its helm values, so
          # config files are root-owned. Match that to read everything
          # without relying on world-readable mode bits.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: emby
                  namespaces:
                    - media
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: restic
              image: ghcr.io/madic-creates/container-restic:latest@sha256:c5786cdded119d4bf44680e95f54a4cbb0f89ddb05eab83937709f0b6338a811
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /usr/local/bin/backup.sh
              env:
                - name: HOME
                  value: /home/restic
              envFrom:
                - secretRef:
                    name: backup-env-configuration-emby
              volumeMounts:
                - name: backup-script
                  mountPath: /usr/local/bin/backup.sh
                  subPath: backup.sh
                - name: emby-config
                  mountPath: /backup/emby-config
                  readOnly: true
                - name: home
                  mountPath: /home/restic
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
          volumes:
            - name: emby-config
              persistentVolumeClaim:
                claimName: longhorn-pvc-emby
            - name: backup-script
              configMap:
                name: crontab-backup-script
            - name: home
              emptyDir:
                medium: Memory
                sizeLimit: 200Mi
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backup-emby
  namespace: media
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: backup-emby
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: monitoring
            k8s:io.kubernetes.pod.namespace: monitoring
            k8s:app.kubernetes.io/name: prometheus-pushgateway
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
    # Local restic REST-server (primary backup target)
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: backup
            k8s:io.kubernetes.pod.namespace: backup
            k8s:app.kubernetes.io/name: rest-server
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # ntfy notifications on failure
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
