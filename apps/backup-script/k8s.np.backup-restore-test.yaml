---
# Egress for the weekly restore-test CronJob.
# Same shape as restic-retentionpolicies: DNS, Pushgateway, and HTTPS
# to Wasabi. No SMTP and no host/remote-node entries — this CronJob
# does not send mail and is not on hostNetwork.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backup-restore-test
  namespace: longhorn
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: backup-restore-test
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: monitoring
            k8s:io.kubernetes.pod.namespace: monitoring
            k8s:app.kubernetes.io/name: prometheus-pushgateway
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
    # Local restic REST-server (default weekly restore source)
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: backup
            k8s:io.kubernetes.pod.namespace: backup
            k8s:app.kubernetes.io/name: rest-server
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Wasabi for the quarterly off-site verification run
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
