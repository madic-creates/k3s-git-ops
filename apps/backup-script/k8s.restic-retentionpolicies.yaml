---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: restic-retentionpolicies
  namespace: longhorn
spec:
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  # 03:05 daily. The other backup CronJobs are staggered around the hour
  # (mariadb :10, grafana :20, emby :30, nextpvr :40, downloader :50,
  # paperless :00); 03:05 lands in the gap before mariadb's 03:10 slot.
  # `restic forget` and `prune` use --retry-lock 10m, so even an unlucky
  # overlap with a long-running backup will block, not corrupt.
  schedule: "5 3 * * *"
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: restic-retentionpolicies
        spec:
          # Script never talks to the Kubernetes API (only S3, Pushgateway,
          # Postfix) — skip the default ServiceAccount token mount.
          automountServiceAccountToken: false
          # Runs as nobody — this CronJob only touches the remote restic
          # repo and an in-memory cache; no app files are accessed.
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            runAsNonRoot: true
          containers:
            - name: restic
              image: ghcr.io/madic-creates/container-restic:latest@sha256:c5786cdded119d4bf44680e95f54a4cbb0f89ddb05eab83937709f0b6338a811
              env:
                # Writable HOME on the tmpfs emptyDir — needed once we
                # dropped root, since restic and rclone otherwise try to
                # create $HOME/.cache or $HOME/.rclone.conf under "/".
                - name: HOME
                  value: /home/restic
                # Pin restic's cache to the same tmpfs so the "Pruning
                # repository" step has fast access to the indexes within
                # one run.
                - name: RESTIC_CACHE_DIR
                  value: /home/restic/.cache/restic
                # Move rclone config out of /root because we no longer
                # are root.
                - name: RCLONE_CONFIG
                  value: /etc/rclone/rclone.conf
              envFrom:
                - secretRef:
                    name: restic-backup
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  set -o pipefail
                  EXIT_CODE=0
                  JOB_START_TIME=$(date +%s)
                  LOG=$(mktemp)
                  mkdir -p "$RESTIC_CACHE_DIR" | tee -a $LOG
                  echo| tee -a $LOG
                  rclone size wasabi:k3s-at-home-01 | tee -a $LOG
                  echo -e "\nRestic locks information" | tee -a $LOG
                  for id in $(restic list locks); do echo "=== $id ==="; restic cat lock $id; done
                  # Legacy capital-case tags from the pre-migration era.
                  # No new snapshots are written under these tags; once the
                  # last legacy snapshot ages out via the keep-* policy,
                  # this loop becomes a no-op and can be removed.
                  for TAG in MariaDB NextPVR; do
                    echo -e "\nRetention policies for ${TAG} (legacy tag)" | tee -a $LOG
                    restic forget --retry-lock 10m --tag "${TAG}" --group-by "host,tags" --keep-hourly 48 --keep-daily 7 --keep-weekly 2 --keep-monthly 0 --keep-yearly 0 --keep-last 4 2>&1 | tee -a $LOG || EXIT_CODE=$?
                  done
                  # Current lowercase tags. mariadb is included even though
                  # backup-mariadb still writes "--tag MariaDB" today —
                  # restic forget on a tag with no snapshots is a no-op,
                  # and the entry is ready for the upcoming migration.
                  for TAG in mariadb emby nextpvr downloader paperless grafana; do
                    echo -e "\nRetention policies for ${TAG}" | tee -a $LOG
                    restic forget --retry-lock 10m --tag "${TAG}" --group-by "host,tags" --keep-hourly 48 --keep-daily 7 --keep-weekly 2 --keep-monthly 0 --keep-yearly 0 --keep-last 4 2>&1 | tee -a $LOG || EXIT_CODE=$?
                  done
                  echo -e "\nPruning repository" | tee -a $LOG
                  restic prune --retry-lock 10m 2>&1 | tee -a $LOG || EXIT_CODE=$?
                  # Verify a deterministic 5% sample of pack files is
                  # actually readable. Catches Wasabi-side bit-rot,
                  # missing pack files, and index inconsistencies that
                  # forget/prune would otherwise miss. Over ~20 daily
                  # runs the entire repo gets covered statistically.
                  echo -e "\nIntegrity check (5% sample)" | tee -a $LOG
                  restic check --retry-lock 10m --read-data-subset 5% 2>&1 | tee -a $LOG || EXIT_CODE=$?
                  echo | tee -a $LOG
                  rclone size wasabi:k3s-at-home-01 | tee -a $LOG
                  JOB_DURATION=$(( $(date +%s) - JOB_START_TIME ))
                  JOB_RUNTIME=$(date -u -d @${JOB_DURATION} +"%T")
                  echo "Script runtime: $JOB_RUNTIME" | tee -a $LOG
                  echo "Final exit code: $EXIT_CODE" | tee -a $LOG
                  if [ "$EXIT_CODE" = "0" ]; then JOB_STATUS="success"; else JOB_STATUS="failure"; fi
                  {
                    echo "backup_duration_seconds ${JOB_DURATION}"
                    echo "backup_start_timestamp ${JOB_START_TIME}"
                    echo "backup_status{status=\"${JOB_STATUS}\"} ${EXIT_CODE}"
                  } | curl -s --data-binary @- "http://prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/backup/instance/restic-retentionpolicies" | tee -a $LOG
                  {
                    echo "Subject: Restic Retention Policy Report"
                    echo "From: \"Restic Forgety\" <no-reply@geekbundle.org>"
                    echo
                    cat $LOG
                  } | sendmail -S postfix.media.svc.cluster.local:25 webmaster@geekbundle.org
                  exit $EXIT_CODE
                  #while true; do sleep 1000; done
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
              volumeMounts:
                - name: rclone-config
                  mountPath: /etc/rclone/rclone.conf
                  subPath: rclone.conf
                - name: home
                  mountPath: /home/restic
          volumes:
            - name: rclone-config
              configMap:
                name: rclone-config
            - name: home
              emptyDir:
                medium: Memory
                sizeLimit: 1Gi
          restartPolicy: Never
