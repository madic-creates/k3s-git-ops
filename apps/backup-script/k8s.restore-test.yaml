---
# Weekly full-fleet restore test.
#
# Each Sunday at 04:00, this CronJob restores the latest snapshot
# of every configured tag from the local rest-server to an
# emptyDir scratch volume and runs a tag-specific sanity check.
# Each tag's outcome is pushed as
# backup_restore_status{tag=...} to the Pushgateway under
# instance=<tag>.
#
# The test reads from rest-server over LAN — no Wasabi egress, no
# 1:1 ratio cap. Restoring all tags every week therefore caps
# detection latency at one week per tag.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-restore-test
  namespace: longhorn
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 0
      # 2 h is comfortable headroom: paperless dominates the runtime
      # (~8 GB at LAN read speed); the other tags finish in seconds
      # to a couple of minutes. emptyDir is wiped between iterations
      # so the 10 GiB sizeLimit is enough for the single largest tag.
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-restore-test
            app.kubernetes.io/component: backup
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          # nobody — the script only reads from the local rest-server
          # and writes to an ephemeral scratch volume; no app data is
          # touched.
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            runAsNonRoot: true
          containers:
            - name: restore-test
              image: ghcr.io/madic-creates/container-restic:latest@sha256:c5786cdded119d4bf44680e95f54a4cbb0f89ddb05eab83937709f0b6338a811
              imagePullPolicy: IfNotPresent
              env:
                - name: HOME
                  value: /home/restic
                - name: RESTIC_CACHE_DIR
                  value: /home/restic/.cache/restic
              envFrom:
                - secretRef:
                    name: restic-backup
              command:
                - sh
                - -c
                - |
                  set +e
                  JOB_START_TIME=$(date +%s)
                  OVERALL_STATUS=0

                  # Configured rotation. Add or remove tags here as the
                  # backup fleet evolves; the verifier case statement
                  # below must learn the new tag at the same time.
                  TAGS="mariadb emby nextpvr downloader paperless grafana"

                  for TAG in $TAGS; do
                    TAG_START_TIME=$(date +%s)
                    TARGET=/restore/$TAG
                    echo
                    echo "=== Restore-test tag=$TAG ==="
                    rm -rf /restore/* && mkdir -p $TARGET

                    restic restore latest --tag "$TAG" --target $TARGET
                    RESTORE_EC=$?

                    if [ $RESTORE_EC -ne 0 ]; then
                      echo "ERROR: restic restore exited $RESTORE_EC"
                      STATUS=$RESTORE_EC
                    else
                      # Each verifier passes if the canonical file/dir
                      # exists and is non-empty. restic itself checksums
                      # every blob during restore, so bit-level integrity
                      # is already covered — these checks add a sanity
                      # layer on top (right files in right places).
                      case "$TAG" in
                        mariadb)
                          [ -s "$TARGET/backup/mariadb.xb" ] && STATUS=0 || STATUS=1 ;;
                        grafana)
                          [ -s "$TARGET/backup/grafana/grafana.db" ] && STATUS=0 || STATUS=1 ;;
                        emby)
                          [ -s "$TARGET/backup/emby-config/system.xml" ] && STATUS=0 || STATUS=1 ;;
                        nextpvr)
                          [ -s "$TARGET/backup/nextpvr-config/config.xml" ] && STATUS=0 || STATUS=1 ;;
                        downloader)
                          STATUS=0
                          for db in sonarr/sonarr.db radarr/radarr.db lidarr/lidarr.db; do
                            [ -s "$TARGET/backup/$db" ] || STATUS=1
                          done ;;
                        paperless)
                          if [ -d "$TARGET/backup/paperless-data" ] \
                             && [ -d "$TARGET/backup/paperless-media" ] \
                             && [ -d "$TARGET/backup/paperless-export" ]; then
                            STATUS=0
                          else
                            STATUS=1
                          fi ;;
                        *)
                          echo "ERROR: no verifier defined for tag $TAG"
                          STATUS=1 ;;
                      esac
                    fi

                    TAG_DURATION=$(( $(date +%s) - TAG_START_TIME ))
                    echo "Verification status=$STATUS duration=${TAG_DURATION}s"

                    {
                      echo "backup_restore_status{tag=\"$TAG\"} $STATUS"
                      echo "backup_restore_duration_seconds{tag=\"$TAG\"} $TAG_DURATION"
                    } | curl -s --data-binary @- \
                         "$PUSHGATEWAY_URL/metrics/job/backup-restore-test/instance/$TAG"

                    [ $STATUS -ne 0 ] && OVERALL_STATUS=$STATUS
                  done

                  rm -rf /restore/*
                  JOB_DURATION=$(( $(date +%s) - JOB_START_TIME ))
                  echo
                  echo "=== All tags processed in ${JOB_DURATION}s, overall_status=$OVERALL_STATUS ==="
                  exit $OVERALL_STATUS
              volumeMounts:
                - name: home
                  mountPath: /home/restic
                - name: workspace
                  mountPath: /restore
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
          volumes:
            - name: home
              emptyDir:
                medium: Memory
                sizeLimit: 200Mi
            # Disk-backed scratch volume sized for the largest tag
            # (paperless, ~8 GB today). Switch to a Longhorn PVC if
            # any tag exceeds this; tmpfs would consume too much RAM.
            - name: workspace
              emptyDir:
                sizeLimit: 10Gi
