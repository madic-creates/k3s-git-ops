---
# Weekly round-robin restore test for the backup fleet.
#
# Each Sunday at 04:00, this CronJob picks ONE backup tag (cycling
# through all six over six weeks based on the ISO week number),
# restores the latest snapshot of that tag to a scratch volume, and
# runs a tag-specific sanity check on the result. The outcome is
# pushed as backup_restore_status{tag=...} to the Pushgateway.
#
# Round-robin keeps the monthly Wasabi egress under ~10 GB even for
# the largest tag (paperless ~8 GB), comfortably within the
# free-egress envelope (1:1 with stored volume per Wasabi policy).
#
# Detection latency per class is up to 6 weeks. Acceptable for a
# home cluster; a more aggressive cadence is documented in
# https://github.com/madic-creates/k3s-git-ops/issues/148.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-restore-test
  namespace: longhorn
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-restore-test
            app.kubernetes.io/component: backup
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          # nobody — the script only reads from Wasabi and writes to
          # an ephemeral scratch volume; no app data is touched.
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            runAsNonRoot: true
          containers:
            - name: restore-test
              image: ghcr.io/madic-creates/container-restic:latest@sha256:58f2fad86c6d06cec34314873440dab6bb035d16a355fb79f9cb2ff7dbc802db
              imagePullPolicy: IfNotPresent
              env:
                - name: HOME
                  value: /home/restic
                - name: RESTIC_CACHE_DIR
                  value: /home/restic/.cache/restic
              envFrom:
                - secretRef:
                    name: restic-backup
              command:
                - sh
                - -c
                - |
                  set +e
                  JOB_START_TIME=$(date +%s)
                  WEEK=$(date +%V)

                  # Round-robin by ISO week number — picks the same tag
                  # for the entire week regardless of which day the run
                  # actually fires (handy for catch-up runs after a
                  # missed slot).
                  TAGS="mariadb emby nextpvr downloader paperless grafana"
                  INDEX=$(( ($WEEK - 1) % 6 ))
                  TAG=$(echo "$TAGS" | cut -d' ' -f$((INDEX + 1)))

                  TARGET=/restore/$TAG
                  echo "=== Restore-test tag=$TAG (week $WEEK) ==="
                  rm -rf /restore/* && mkdir -p $TARGET

                  restic restore latest --tag "$TAG" --target $TARGET
                  RESTORE_EC=$?

                  if [ $RESTORE_EC -ne 0 ]; then
                    echo "ERROR: restic restore exited $RESTORE_EC"
                    STATUS=$RESTORE_EC
                  else
                    # Each verifier passes if the canonical file/dir
                    # exists and is non-empty. restic itself checksums
                    # every blob during restore, so bit-level integrity
                    # is already covered — these checks add a sanity
                    # layer on top (right files in right places).
                    case "$TAG" in
                      mariadb)
                        [ -s "$TARGET/backup/mariadb.xb" ] && STATUS=0 || STATUS=1 ;;
                      grafana)
                        [ -s "$TARGET/backup/grafana/grafana.db" ] && STATUS=0 || STATUS=1 ;;
                      emby)
                        [ -s "$TARGET/backup/emby-config/system.xml" ] && STATUS=0 || STATUS=1 ;;
                      nextpvr)
                        [ -s "$TARGET/backup/nextpvr-config/config.xml" ] && STATUS=0 || STATUS=1 ;;
                      downloader)
                        STATUS=0
                        for db in sonarr/sonarr.db radarr/radarr.db lidarr/lidarr.db; do
                          [ -s "$TARGET/backup/$db" ] || STATUS=1
                        done ;;
                      paperless)
                        if [ -d "$TARGET/backup/paperless-data" ] \
                           && [ -d "$TARGET/backup/paperless-media" ] \
                           && [ -d "$TARGET/backup/paperless-export" ]; then
                          STATUS=0
                        else
                          STATUS=1
                        fi ;;
                      *)
                        echo "ERROR: no verifier defined for tag $TAG"
                        STATUS=1 ;;
                    esac
                  fi

                  JOB_DURATION=$(( $(date +%s) - JOB_START_TIME ))
                  echo "Verification status=$STATUS duration=${JOB_DURATION}s"

                  {
                    echo "backup_restore_status{tag=\"$TAG\"} $STATUS"
                    echo "backup_restore_duration_seconds{tag=\"$TAG\"} $JOB_DURATION"
                  } | curl -s --data-binary @- \
                       "$PUSHGATEWAY_URL/metrics/job/backup-restore-test/instance/$TAG"

                  rm -rf /restore/*
                  exit $STATUS
              volumeMounts:
                - name: home
                  mountPath: /home/restic
                - name: workspace
                  mountPath: /restore
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
          volumes:
            - name: home
              emptyDir:
                medium: Memory
                sizeLimit: 200Mi
            # Disk-backed scratch volume sized for the largest tag
            # (paperless, ~8 GB today). Switch to a Longhorn PVC if
            # any tag exceeds this; tmpfs would consume too much RAM.
            - name: workspace
              emptyDir:
                sizeLimit: 10Gi
