---
# Weekly full-fleet restore test.
#
# Each Sunday at 04:00, this CronJob restores the latest snapshot
# of every configured tag from the local rest-server to an
# emptyDir scratch volume and runs a tag-specific sanity check.
# Each tag's outcome is pushed as
# backup_restore_status{tag=...} to the Pushgateway under
# instance=<tag>.
#
# The test reads from rest-server over LAN — no Wasabi egress, no
# 1:1 ratio cap. Restoring all tags every week therefore caps
# detection latency at one week per tag.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-restore-test
  namespace: longhorn
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 0
      # 2 h is comfortable headroom: paperless dominates the runtime
      # at LAN read speed; the other tags finish in seconds to a
      # couple of minutes. emptyDir is wiped between iterations so
      # the 20 GiB sizeLimit is enough for the single largest tag.
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-restore-test
            app.kubernetes.io/component: backup
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          # nobody — the script only reads from the local rest-server
          # and writes to an ephemeral scratch volume; no app data is
          # touched.
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            runAsNonRoot: true
          containers:
            - name: restore-test
              image: ghcr.io/madic-creates/container-restic:latest@sha256:5882ed8d36b4381ee2e6a7dad1a0c99f0341653a262209d655c69cee89770e62
              imagePullPolicy: IfNotPresent
              env:
                - name: HOME
                  value: /home/restic
                - name: RESTIC_CACHE_DIR
                  value: /home/restic/.cache/restic
              envFrom:
                - secretRef:
                    name: restic-backup
              command:
                - sh
                - -c
                - |
                  set +e
                  JOB_START_TIME=$(date +%s)
                  OVERALL_STATUS=0

                  # Configured rotation. Add or remove tags here as the
                  # backup fleet evolves; the verifier case statement
                  # below must learn the new tag at the same time.
                  TAGS="mariadb emby nextpvr downloader paperless grafana minecraft unifi"

                  for TAG in $TAGS; do
                    TAG_START_TIME=$(date +%s)
                    TARGET=/restore/$TAG
                    echo
                    echo "=== Restore-test tag=$TAG ==="
                    rm -rf /restore/* && mkdir -p $TARGET

                    restic restore latest --tag "$TAG" --target $TARGET
                    RESTORE_EC=$?

                    if [ $RESTORE_EC -ne 0 ]; then
                      echo "ERROR: restic restore exited $RESTORE_EC"
                      STATUS=$RESTORE_EC
                    else
                      # Each verifier confirms the canonical files or
                      # directories landed in the expected layout.
                      # restic itself checksums every blob during restore,
                      # so bit-level integrity is already covered — these
                      # checks add a sanity layer (right files in right
                      # places). Each branch writes a one-line FAIL_REASON
                      # when STATUS=1 so the log explains what was missing.
                      STATUS=0
                      FAIL_REASON=""
                      case "$TAG" in
                        mariadb)
                          if [ ! -s "$TARGET/backup/mariadb.xb" ]; then
                            STATUS=1
                            FAIL_REASON="$TARGET/backup/mariadb.xb missing or empty"
                          fi ;;
                        grafana)
                          if [ ! -s "$TARGET/backup/grafana/grafana.db" ]; then
                            STATUS=1
                            FAIL_REASON="$TARGET/backup/grafana/grafana.db missing or empty"
                          fi ;;
                        emby)
                          # Emby's config layout varies by version (some
                          # ship system.xml at the root, some don't).
                          # Just confirm the config dir was restored and
                          # contains content — restic already vouched for
                          # the bytes.
                          if [ ! -d "$TARGET/backup/emby-config" ]; then
                            STATUS=1
                            FAIL_REASON="$TARGET/backup/emby-config not a directory"
                          elif [ -z "$(ls -A "$TARGET/backup/emby-config" 2>/dev/null)" ]; then
                            STATUS=1
                            FAIL_REASON="$TARGET/backup/emby-config is empty"
                          fi ;;
                        nextpvr)
                          if [ ! -d "$TARGET/backup/nextpvr-config" ]; then
                            STATUS=1
                            FAIL_REASON="$TARGET/backup/nextpvr-config not a directory"
                          elif [ -z "$(ls -A "$TARGET/backup/nextpvr-config" 2>/dev/null)" ]; then
                            STATUS=1
                            FAIL_REASON="$TARGET/backup/nextpvr-config is empty"
                          fi ;;
                        downloader)
                          for db in sonarr/sonarr.db radarr/radarr.db lidarr/lidarr.db; do
                            if [ ! -s "$TARGET/backup/$db" ]; then
                              STATUS=1
                              FAIL_REASON="$TARGET/backup/$db missing or empty"
                              break
                            fi
                          done ;;
                        paperless)
                          for d in paperless-data paperless-media paperless-export; do
                            if [ ! -d "$TARGET/backup/$d" ]; then
                              STATUS=1
                              FAIL_REASON="$TARGET/backup/$d not a directory"
                              break
                            fi
                          done ;;
                        minecraft)
                          # The world name comes from minecraftServer.worldSaveName
                          # in the helm valuesInline. level.dat is the canonical
                          # marker that the world directory was actually restored.
                          if [ ! -s "$TARGET/backup/minecraft/SmallServerHub/level.dat" ]; then
                            STATUS=1
                            FAIL_REASON="$TARGET/backup/minecraft/SmallServerHub/level.dat missing or empty"
                          fi ;;
                        unifi)
                          # system.properties is written by the controller for
                          # every site and lives directly under data/.
                          if [ ! -s "$TARGET/backup/unifi-controller/data/system.properties" ]; then
                            STATUS=1
                            FAIL_REASON="$TARGET/backup/unifi-controller/data/system.properties missing or empty"
                          fi ;;
                        *)
                          STATUS=1
                          FAIL_REASON="no verifier defined for tag $TAG" ;;
                      esac

                      if [ $STATUS -ne 0 ]; then
                        echo "ERROR: $FAIL_REASON"
                        echo "Tree under $TARGET (max depth 2):"
                        find "$TARGET" -maxdepth 2 2>&1 | head -30
                      fi
                    fi

                    TAG_DURATION=$(( $(date +%s) - TAG_START_TIME ))
                    echo "Verification status=$STATUS duration=${TAG_DURATION}s"

                    {
                      echo "backup_restore_status{tag=\"$TAG\"} $STATUS"
                      echo "backup_restore_duration_seconds{tag=\"$TAG\"} $TAG_DURATION"
                    } | curl -s --data-binary @- \
                         "$PUSHGATEWAY_URL/metrics/job/backup-restore-test/instance/$TAG"

                    [ $STATUS -ne 0 ] && OVERALL_STATUS=$STATUS
                  done

                  rm -rf /restore/*
                  JOB_DURATION=$(( $(date +%s) - JOB_START_TIME ))
                  echo
                  echo "=== All tags processed in ${JOB_DURATION}s, overall_status=$OVERALL_STATUS ==="
                  exit $OVERALL_STATUS
              volumeMounts:
                - name: home
                  mountPath: /home/restic
                - name: workspace
                  mountPath: /restore
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
          volumes:
            - name: home
              # Node-disk cache, not RAM. restic caches the repo index,
              # snapshots and tree packs while restoring; that working
              # set outgrew the old 200Mi memory tmpfs and hit ENOSPC
              # ("no space left on device") on the index, failing the
              # restore. Cache blobs are encrypted repo packs (no
              # plaintext), so node disk is safe, and node ephemeral
              # storage (~215Gi) is abundant while node RAM is contended.
              emptyDir:
                sizeLimit: 5Gi
            # Disk-backed scratch volume sized for the largest tag
            # (paperless dominates today). Switch to a Longhorn PVC
            # if any tag exceeds this; tmpfs would consume too much
            # RAM.
            - name: workspace
              emptyDir:
                sizeLimit: 20Gi
