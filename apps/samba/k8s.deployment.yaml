apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  labels:
    app.kubernetes.io/name: samba
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: samba
  template:
    metadata:
      labels:
        app.kubernetes.io/name: samba
    spec:
      serviceAccountName: samba
      nodeSelector:
        node-role/workload: zfs
      containers:
      - name: samba
        image: forge.geekbundle.org/madic/docker-samba@sha256:0d0c49c5381c8b1e717e5d72786225307cee29a987173d4c7d80ea0e2f1ecc90
        env:
          - name: UID
            value: "111"
          - name: GID
            value: "118"
          - name: GIDLIST
            value: "1002"
          - name: TZ
            value: "Europe/Berlin"
        resources:
          requests:
            cpu: 50m
            memory: 96Mi
        ports:
          - containerPort: 445
            protocol: TCP
        volumeMounts:
          - name: smb-conf
            mountPath: /etc/samba/smb.conf
            subPath: smb.conf
            readOnly: true
          # Only the paths actually served as shares are mounted. Mounting
          # the whole pool made every dataset below it busy in samba's mount
          # namespace, which blocked `zfs destroy` on unrelated datasets.
          - name: backups
            mountPath: /vol_raidz1/backups
          - name: video
            mountPath: /vol_raidz1/video
          - name: downloads
            mountPath: /vol_raidz1/downloads
          - name: music
            mountPath: /vol_raidz1/music
          - name: photo
            mountPath: /vol_raidz1/photo
          - name: documents
            mountPath: /vol_raidz1/documents
          - name: container-scheduler
            mountPath: /vol_raidz1/container-scheduler
          - name: samba-data
            mountPath: /var/lib/samba
          - name: group
            mountPath: /etc/group
          - name: passwd
            mountPath: /etc/passwd
          - name: shadow
            mountPath: /etc/shadow
      volumes:
        - name: smb-conf
          configMap:
            name: samba-config
        - name: backups
          hostPath:
            path: /vol_raidz1/backups
            type: Directory
        - name: video
          hostPath:
            path: /vol_raidz1/video
            type: Directory
        - name: downloads
          hostPath:
            path: /vol_raidz1/downloads
            type: Directory
        - name: music
          hostPath:
            path: /vol_raidz1/music
            type: Directory
        - name: photo
          hostPath:
            path: /vol_raidz1/photo
            type: Directory
        - name: documents
          hostPath:
            path: /vol_raidz1/documents
            type: Directory
        - name: container-scheduler
          hostPath:
            path: /vol_raidz1/container-scheduler
            type: Directory
        - name: samba-data
          hostPath:
            path: /vol_raidz1/docker/configs/samba/data
            type: Directory
        - name: group
          hostPath:
            path: /vol_raidz1/docker/configs/samba/group
            type: File
        - name: passwd
          hostPath:
            path: /vol_raidz1/docker/configs/samba/passwd
            type: File
        - name: shadow
          hostPath:
            path: /vol_raidz1/docker/configs/samba/shadow
            type: File
