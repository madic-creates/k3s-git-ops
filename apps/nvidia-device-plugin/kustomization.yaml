---
namespace: nvidia-device-plugin

resources:
  - namespace.yaml
  - k8s.np.nvidia-device-plugin-default-deny.yaml
  - k8s.np.nvidia-device-plugin.yaml

helmCharts:
  - name: nvidia-device-plugin
    repo: https://nvidia.github.io/k8s-device-plugin
    version: 0.19.2
    namespace: nvidia-device-plugin
    releaseName: nvidia-device-plugin
    includeCRDs: true
    # NOTE: chart 0.19.1 always renders an MPS-control-daemon DaemonSet in
    # addition to the device plugin DaemonSet. We do not use MPS sharing
    # (the downstream llama-cpp workload requires exclusive GPU access),
    # so the MPS daemon idles. There is no simple values flag to disable
    # it in this chart version; revisit with a kustomize delete patch if
    # the idle daemon becomes a real cost.
    valuesInline:
      runtimeClassName: nvidia
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
      # The chart's default nodeAffinity targets `pci-10de.present` (no PCI
      # class prefix). Our NFD configuration emits `pci-0300_10de.present`
      # (with the 0300 display-controller class prefix) instead, and node04
      # has an AMD CPU so the Tegra fallback `cpu-model.vendor_id=NVIDIA`
      # also misses. Override the affinity to match our actual label.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: feature.node.kubernetes.io/pci-0300_10de.present
                    operator: In
                    values:
                      - "true"

commonAnnotations:
  argocd.argoproj.io/sync-wave: "24"
