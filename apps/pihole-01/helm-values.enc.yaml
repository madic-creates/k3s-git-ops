image:
    repository: ghcr.io/pi-hole/pihole
    #tag: 2025.11.1
    pullPolicy: IfNotPresent
revisionHistoryLimit: 2
serviceDns:
    mixedService: true
    annotations:
        lbipam.cilium.io/ips: 192.168.1.232
        lbipam.cilium.io/sharing-key: piholednsdhcp
    # type LoadBalancer with externalTrafficPolicy Local
    # requires 192.168.1.232 on the same node as the pod
    type: LoadBalancer
    #externalTrafficPolicy: Cluster
    #type: ClusterIP
serviceDhcp:
    annotations:
        lbipam.cilium.io/ips: 192.168.1.232
        lbipam.cilium.io/sharing-key: piholednsdhcp
    type: LoadBalancer
virtualHost: ENC[AES256_GCM,data:rz5V/1k6qVV74L6n8by19tyvl+4XG85ufJCGQQ==,iv:32bgVCde7CIuiXDFGciSKtQAP2lC5CxR08G5okli3uA=,tag:eQncB0WNdye4yzEzhAKouw==,type:str]
ingress:
