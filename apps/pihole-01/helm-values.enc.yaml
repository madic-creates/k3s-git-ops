    ingressClassName: traefik
    hosts:
        - ENC[AES256_GCM,data:4ywJUvbhcFXJFiVwcXP4fLcDu0PA2XMjCNUvEA==,iv:OLpzmEIkDp9kMcbUaRpy+B7OOwWZmsmdBW/WwMEwwa8=,tag:Ds/WfaXHIT2EUzKGyRHoGg==,type:str]
    tls:
        - secretName: wildcard-cloudflare-production-02
          hosts:
            - ENC[AES256_GCM,data:y+KuwFfbIQzNGp+T4ZZ+WrFJ+6v8GTJxE7+MjQ==,iv:6svhmnXUSKdYAODpYAFi+IO8XEOmV6ywC17ToHuMgpE=,tag:3Nxj2Fhu6F2gj7qeb4rhow==,type:str]
    annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web239, websecure239
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd, traefik-root-to-admin@kubernetescrd
resources:
    limits:
        cpu: 1000m
        memory: 1024Mi
    requests:
        cpu: 100m
        memory: 128Mi
extraEnvVars:
    TZ: Europe/Berlin
    #FTLCONF_LOCAL_IPV4: 192.168.1.232
    #FTLCONF_dns_dnssec: true
    FTLCONF_dns_bogusPriv: true
    FTLCONF_dns_domainNeeded: true
    FTLCONF_dhcp_start: 192.168.1.50
    FTLCONF_dhcp_end: 192.168.1.200
    FTLCONF_dhcp_router: 192.168.1.1
    FTLCONF_dhcp_leaseTime: 12d
    FTLCONF_dns_domain_name: neese-web.de
    FTLCONF_dhcp_rapidCommit: true
    FTLCONF_webserver_interface_boxed: false
    #FTLCONF_MOZILLA_CANARY: true
    #FTLCONF_BLOCK_ICLOUD_PR: true
DNS1: 127.0.0.1:5053
# Not required because secured via authelia oidc
admin:
    enabled: false
doh:
    enabled: true
    config: |
        listen_addresses = ['0.0.0.0:5053']
        server_names = ['nextdns-135128']
        require_dnssec = false
        require_nolog = true
        require_nofilter = true
        dnscrypt_servers = true
        doh_servers = true
        odoh_servers = false
        ipv6_servers = false
        bootstrap_resolvers = ['9.9.9.9:53', '1.1.1.1:53']
        timeout = 5000
        keepalive = 30
        log_level = 2
        use_syslog = false
        cache = true
        cache_size = 4096
        cache_min_ttl = 2400
        cache_max_ttl = 86400
        cache_neg_min_ttl = 60
        cache_neg_max_ttl = 600

        [sources]

        [static]
          [static.'nextdns-135128']
            # https://dns.nextdns.io/135128/pihole03
            # https://dnscrypt.info/stamps/
            stamp = 'sdns://AgcAAAAAAAAAEjIxNy4xNDYuMjIuMTYzOjQ0MwAOZG5zLm5leHRkbnMuaW8QLzEzNTEyOC9waWhvbGUwMwA'
