---
# Restic REST server — local-first repository for the backup fleet.
# Pinned to the ZFS node via nodeSelector; the repository data lives
# on the host filesystem at /vol_raidz1/restic-local. A daily mirror
# CronJob (k8s.backup-mirror-wasabi.yaml) syncs the on-disk repo to
# Wasabi for off-site protection.
#
# Single replica with strategy: Recreate because the underlying
# storage is hostPath on a single node — multiple replicas would
# corrupt the repo on concurrent writes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-server
  namespace: backup
  labels:
    app.kubernetes.io/name: rest-server
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rest-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rest-server
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        node-role/workload: zfs
      # The repo is owned by 65534 on the host filesystem (set up
      # during initial provisioning). fsGroup does not apply to
      # hostPath, but it does apply to the htpasswd Secret mount —
      # the Secret would otherwise be group root and rest-server
      # (running as 65534) could not read it.
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        runAsNonRoot: true
      containers:
        - name: rest-server
          image: restic/rest-server:0.14.0
          imagePullPolicy: IfNotPresent
          # The image's CMD is `rest-server` only — without an
          # ENTRYPOINT, K8s `args:` would replace CMD and `exec` would
          # try to run `--listen` as a binary. Spell out the command
          # explicitly so the binary is invoked regardless of how the
          # upstream Dockerfile evolves.
          # --no-auth would skip the htpasswd check; we always require
          # auth even though the service is cluster-internal.
          # --private-repos puts each user under its own subdir; we
          # use a single shared user so disable that.
          command:
            - rest-server
          args:
            - --listen=:8000
            - --path=/data
            # rest-server looks for .htpasswd inside --path by default;
            # we keep the secret mount separate from the data volume,
            # so point at it explicitly.
            - --htpasswd-file=/etc/htpasswd/htpasswd
          env:
            # Expose Prometheus metrics on /metrics. Pushgateway already
            # has scrape rules for the backup namespace — this gives us
            # request rates and bytes-served for free.
            - name: PROMETHEUS_NO_AUTH
              value: "true"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
            - name: htpasswd
              mountPath: /etc/htpasswd
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # rest-server requires Basic Auth on every endpoint except
          # /metrics, so HTTP probes against / would always 401.
          # TCP probes on the listen port are enough to confirm the
          # process is alive and accepting connections.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
      volumes:
        - name: data
          hostPath:
            path: /vol_raidz1/restic-local
            type: Directory
        - name: htpasswd
          secret:
            secretName: rest-server-htpasswd
            # 0440 + fsGroup=65534 → root:65534 with group-read.
            defaultMode: 0440
