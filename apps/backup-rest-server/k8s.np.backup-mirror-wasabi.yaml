---
# Egress for the Wasabi mirror CronJob: DNS, Pushgateway, ntfy/Wasabi
# (HTTPS to world). No ingress — pure outbound.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backup-mirror-wasabi
  namespace: backup
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: backup-mirror-wasabi
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: monitoring
            k8s:io.kubernetes.pod.namespace: monitoring
            k8s:app.kubernetes.io/name: prometheus-pushgateway
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
    # Wasabi S3 + ntfy
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
