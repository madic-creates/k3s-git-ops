apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-alert-kubernetes-analyzer
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-alert-kubernetes-analyzer
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-alert-kubernetes-analyzer
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-alert-kubernetes-analyzer
subjects:
  - kind: ServiceAccount
    name: claude-alert-kubernetes-analyzer
    namespace: monitoring
