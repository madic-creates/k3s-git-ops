apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-alert-kubernetes-analyzer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: claude-alert-kubernetes-analyzer
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-alert-kubernetes-analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-alert-kubernetes-analyzer
    spec:
      serviceAccountName: claude-alert-kubernetes-analyzer
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analyzer
          image: ghcr.io/madic-creates/claude-alert-kubernetes-analyzer:latest@sha256:340647e46b51a33ef93727b2b2b6602acbc936c530afa4f5d47f24d4e05db87e
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: PROMETHEUS_URL
              value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
            - name: CLAUDE_MODEL
              valueFrom:
                secretKeyRef:
                  name: claude-alert-kubernetes-analyzer-env
                  key: CLAUDE_MODEL
            - name: COOLDOWN_SECONDS
              value: "300"
            - name: ALLOWED_NAMESPACES
              value: "monitoring,databases,media,kube-system"
            - name: MAX_LOG_BYTES
              value: "2048"
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-alert-kubernetes-analyzer-env
                  key: ANTHROPIC_AUTH_TOKEN
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: claude-alert-kubernetes-analyzer-env
                  key: ANTHROPIC_BASE_URL
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: claude-alert-kubernetes-analyzer-env
                  key: WEBHOOK_SECRET
            - name: NTFY_PUBLISH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-alert-kubernetes-analyzer-env
                  key: NTFY_PUBLISH_TOKEN
            - name: NTFY_PUBLISH_URL
              valueFrom:
                secretKeyRef:
                  name: claude-alert-kubernetes-analyzer-env
                  key: NTFY_PUBLISH_URL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
