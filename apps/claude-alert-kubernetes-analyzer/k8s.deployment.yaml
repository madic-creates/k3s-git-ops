apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-alert-kubernetes-analyzer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: claude-alert-kubernetes-analyzer
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-alert-kubernetes-analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-alert-kubernetes-analyzer
    spec:
      serviceAccountName: claude-alert-kubernetes-analyzer
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analyzer
          image: ghcr.io/madic-creates/claude-alert-kubernetes-analyzer:latest@sha256:0577d47a6f407419c521d4aef265e790aee39cbe6d609eb42704c5519795cd51
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9101
              name: metrics
          envFrom:
            - secretRef:
                name: claude-alert-kubernetes-analyzer-env
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: history
              mountPath: /var/lib/analyzer
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: history
          persistentVolumeClaim:
            claimName: claude-alert-kubernetes-analyzer-history
