apiVersion: apps/v1
kind: Deployment
metadata:
  name: nzbhydra2
  namespace: downloader
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  labels:
    app.kubernetes.io/name: nzbhydra2
spec:
  replicas: 1
  revisionHistoryLimit: 3
  # The config volume is ReadWriteOnce; a rolling update would let a second
  # pod attach it and write the same database.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nzbhydra2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nzbhydra2
    spec:
      nodeSelector:
        node-role/workload: zfs
      containers:
      - name: nzbhydra2
        image: linuxserver/nzbhydra2:8.9.0
        env:
          - name: PUID
            value: "0"
          - name: PGID
            value: "1002"
          - name: TZ
            value: "Europe/Berlin"
        resources:
          requests:
            cpu: 100m
            memory: 640Mi
        ports:
          - containerPort: 5076
            name: http
            protocol: TCP
        volumeMounts:
          - name: config
            mountPath: /config
          - name: downloads
            mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: longhorn-pvc-nzbhydra2-config
        # nzbhydra2 never stores anything durable here; the old hostPath
        # directory was empty.
        - name: downloads
          emptyDir: {}
