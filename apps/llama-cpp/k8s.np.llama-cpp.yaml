---
# llama-cpp application-specific network policy.
# Selecting the pod via endpointSelector implicitly puts it under default-deny;
# only explicitly allowed traffic passes.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: llama-cpp
  namespace: llama-cpp
  annotations:
    argocd.argoproj.io/sync-wave: "65"
spec:
  endpointSelector:
    matchLabels:
      app: llama-cpp
  ingress:
    # Traefik forwards client traffic to the OpenAI API surface
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/instance: traefik-kube-system
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Open WebUI calls llama-cpp directly via cluster Service as its OpenAI backend
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: open-webui
            k8s:io.kubernetes.pod.namespace: open-webui
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
