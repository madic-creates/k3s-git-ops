---
apiVersion: v1
kind: Service
metadata:
  name: llama-cpp
  namespace: llama-cpp
spec:
  # Selects on `app` only, so traffic reaches whichever model Deployment is
  # currently scaled up (qwen2.5-coder or andy-4). The single node GPU acts as
  # a mutex: only one model pod can be Running at a time, the other stays
  # Pending, so this Service never load-balances across two different models.
  selector:
    app: llama-cpp
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  type: ClusterIP
