---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp-andy-4
  namespace: llama-cpp
  labels:
    app: llama-cpp
    model: andy-4
spec:
  # Starts at 0 so the GPU stays available to the qwen2.5-coder Deployment by
  # default. Switch on demand with `kubectl scale`; replicas is ignored by
  # ArgoCD (see apps/argo-cd-apps/65-llama-cpp.yaml) so no git sync is needed:
  #   kubectl -n llama-cpp scale deploy/llama-cpp-qwen2.5-coder --replicas=0
  #   kubectl -n llama-cpp scale deploy/llama-cpp-andy-4        --replicas=1
  # Andy-4 (DeepSeek-R1-Distill-Llama-8B, Q4_K_M ~4.9 GB) is the Mindcraft /
  # Minecraft agent model; it fits the single 8 GB GPU alongside its KV cache.
  replicas: 0
  revisionHistoryLimit: 2
  strategy:
    # Single-tenant GPU; rolling would deadlock on nvidia.com/gpu.
    type: Recreate
  selector:
    matchLabels:
      app: llama-cpp
      model: andy-4
  template:
    metadata:
      labels:
        app: llama-cpp
        model: andy-4
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        node-role/workload: zfs
      initContainers:
        # Fail fast with a clear error if the operator forgot to stage the
        # GGUF, or if the file got truncated. Cheaper than a CrashLoop on the
        # main container, which buries the cause in llama.cpp logs.
        # SHA256 pinned from huggingface.co/Sweaterdog/Andy-4 (Andy-4.Q4_K_M.gguf).
        - name: verify-model
          image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
          command:
            - sh
            - -c
            - |
              set -eu
              MODEL=/models/Andy-4.Q4_K_M.gguf
              EXPECTED_SHA256=a0d6e2fd5a47f2fa0a7ab2454c928f166bc2c75ead73ff08f15d52d2b42d044a
              test -f "$MODEL" || { echo "model file missing: $MODEL"; exit 1; }
              # GGUF magic number is the ASCII string "GGUF" at offset 0
              head -c4 "$MODEL" | grep -q '^GGUF' || {
                echo "not a GGUF file (header mismatch)"; exit 1; }
              echo "$EXPECTED_SHA256  $MODEL" | sha256sum -c -
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
      containers:
        - name: llama-cpp
          image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:1852b15c1290e4a36d14f51dc1267c19a50936e4b1e46dc323dc621be629f4b2
          args:
            - --model
            - /models/Andy-4.Q4_K_M.gguf
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --n-gpu-layers
            - "99"
            # Andy-4 ships with an 8192-token context window.
            - --ctx-size
            - "8192"
            - --cache-type-k
            - q8_0
            - --cache-type-v
            - q8_0
            - --parallel
            - "1"
            - --flash-attn
            - "on"
            - --api-key-file
            - /etc/llama-cpp/api-key
            - --alias
            - andy-4
            - --jinja
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: 1
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: api-key
              mountPath: /etc/llama-cpp
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120  # cold model load can be slow
            periodSeconds: 30
            failureThreshold: 6
      volumes:
        - name: models
          hostPath:
            path: /vol_raidz1/downloads/llama-cpp/models
            type: Directory
        - name: api-key
          secret:
            secretName: llama-cpp-env
            defaultMode: 0400
            items:
              - key: API_KEY
                path: api-key
