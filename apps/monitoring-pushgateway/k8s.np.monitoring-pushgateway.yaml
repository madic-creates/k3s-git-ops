---
# Network Policy for Prometheus Pushgateway
# This service receives metrics from various sources via HTTP POST and stores them temporarily
# for Prometheus to scrape. It acts as a metrics aggregation point for batch jobs and scripts.
# Requirements:
# - DNS resolution for internal service discovery
# - Ingress from Prometheus for metrics scraping (port 9091)
# - Ingress from backup scripts and other clients pushing metrics (port 9091)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-pushgateway
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "17"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus-pushgateway
  ingress:
  # Allow Prometheus to scrape metrics from pushgateway
  # Prometheus runs in the monitoring namespace and scrapes pushgateway on port 9091
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        k8s:app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "9091"
        protocol: TCP
  # Allow backup workloads to push metrics to pushgateway.
  # All sources are matched by app.kubernetes.io/name (the canonical pod label).
  # restic-retentionpolicies (longhorn) is the cluster-wide retention CronJob.
  # mariadb-backup (databases) is the database backup CronJob.
  # backup-emby and backup-nextpvr (media) replaced the previous in-pod
  # sidecars and now run as standalone CronJobs.
  # backup-downloader (downloader) backs up the *arr-stack and downloader
  # configs from hostPath volumes on the ZFS node.
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: longhorn
        k8s:app.kubernetes.io/name: restic-retentionpolicies
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: longhorn
        k8s:app.kubernetes.io/name: backup-restore-test
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: databases
        k8s:app.kubernetes.io/name: backup-mariadb
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: media
        k8s:app.kubernetes.io/name: backup-emby
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: media
        k8s:app.kubernetes.io/name: backup-nextpvr
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: downloader
        k8s:app.kubernetes.io/name: backup-downloader
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: paper
        k8s:app.kubernetes.io/name: backup-paperless
    toPorts:
    - ports:
      - port: "9091"
        protocol: TCP
  # nextpvr runs with hostNetwork=true (its CEP is empty), so its pushes are
  # seen by Cilium as host traffic and don't match the pod-label rule above.
  # Allow host and remote-node entities so hostNetwork pods can push too.
  - fromEntities:
      - host
      - remote-node
    toPorts:
    - ports:
      - port: "9091"
        protocol: TCP
  # Allow any pod in the monitoring namespace to push metrics
  # This enables other monitoring tools and exporters to use the pushgateway
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
    toPorts:
    - ports:
      - port: "9091"
        protocol: TCP
  egress:
  # Allow DNS resolution via CoreDNS
  # Required for internal service discovery
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
