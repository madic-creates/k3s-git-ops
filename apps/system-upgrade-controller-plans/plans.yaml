---
# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      # Use the control-plane role label so ALL server nodes are matched.
      # The legacy node-role.kubernetes.io/master label is no longer set by
      # newer k3s versions, which previously left such nodes (e.g. node02)
      # unmatched by this plan and stuck on an old version.
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade
  # Pin an explicit version instead of the stable channel. The channel
  # endpoint was returning two different versions on alternating reconciles
  # (v1.35.5 and v1.36.2), causing the controller to flap and create
  # conflicting upgrade/downgrade Jobs against control-plane (etcd) nodes.
  # A pinned version is deterministic; bump it manually (or via Renovate).
  version: v1.36.2+k3s1
---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      # Agent nodes are everything that is NOT a control-plane/server node.
      # Mirrors the server-plan selector above (control-plane role label),
      # so control-plane nodes are never misclassified as agents.
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  prepare:
    args:
      - prepare
      - server-plan
    image: rancher/k3s-upgrade
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade
  # Pin an explicit version instead of the stable channel. The channel
  # endpoint was returning two different versions on alternating reconciles
  # (v1.35.5 and v1.36.2), causing the controller to flap and create
  # conflicting upgrade/downgrade Jobs against control-plane (etcd) nodes.
  # A pinned version is deterministic; bump it manually (or via Renovate).
  version: v1.36.2+k3s1
