apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-alert-checkmk-analyzer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: claude-alert-checkmk-analyzer
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-alert-checkmk-analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-alert-checkmk-analyzer
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analyzer
          image: ghcr.io/madic-creates/claude-alert-checkmk-analyzer:latest@sha256:1214c2bed735d3d699573b62920e1efc3b2d73ae4c54673bafd3fa388b2e7dc5
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: claude-alert-checkmk-analyzer-env
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: ssh-key
              mountPath: /ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
            - name: ssh-known-hosts
              mountPath: /ssh/known_hosts
              subPath: known_hosts
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: ssh-key
          secret:
            secretName: checkmk-ssh-key
            defaultMode: 0400
        - name: ssh-known-hosts
          secret:
            secretName: claude-alert-checkmk-analyzer-known-hosts
            defaultMode: 0400
