nameOverride: pihole-03
image:
    repository: ghcr.io/pi-hole/pihole
    #tag: 2025.11.0
    pullPolicy: IfNotPresent
revisionHistoryLimit: 2
serviceDns:
    mixedService: true
    annotations:
        lbipam.cilium.io/ips: 192.168.1.238
    # type LoadBalancer with externalTrafficPolicy Local
    # requires 192.168.1.232 on the same node as the pod
    type: LoadBalancer
    #externalTrafficPolicy: Cluster
    #type: ClusterIP
serviceDhcp:
    enabled: false
virtualHost: ENC[AES256_GCM,data:OJmsQJRzcF2mKit1yO2BT4NrFPdW2X0UWDaImpQ7,iv:lq8aNuUmoc9W6nYerzIziAVvckwg5TPcDyuiWEhzSwI=,tag:we85JTbIKAuvnIitvjrnHg==,type:str]
ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
        - ENC[AES256_GCM,data:8vcCjbsbtRHim28Mmt6Qh0ksfRk9C5aek0mgiurd,iv:8kQpVUrI0YqNX6LY/YO0DiKasJ5xsDDLuV6K5Hr+SlU=,tag:jN69d/cZRtus+9kY78CIjA==,type:str]
    tls:
        - secretName: wildcard-cloudflare-production-02
          hosts:
            - ENC[AES256_GCM,data:hg4AAVu+tRH1S33hJ30A6Swoayjxke9wn7jZb71R,iv:ako5BspwsGr2FB0N5S3wmPIKBVFuEfVXXNbdl9EXVPc=,tag:NAgR4WZnDxvjJqfgXCzfWw==,type:str]
    annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web239, websecure239
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd, traefik-root-to-admin@kubernetescrd
resources:
    limits:
        cpu: "1"
        memory: 768Mi
    requests:
        cpu: 100m
        memory: 128Mi
extraEnvVars:
    TZ: Europe/Berlin
    FTLCONF_dns_bogusPriv: true
    FTLCONF_dns_domainNeeded: true
    FTLCONF_dns_domain_name: neese-web.de
    FTLCONF_webserver_interface_boxed: false
DNS1: 127.0.0.1:5053
DNS2: ""
# Not required because secured via authelia oidc
admin:
    enabled: false
doh:
    enabled: true
    config: |
        listen_addresses = ['0.0.0.0:5053']
        server_names = ['nextdns-735278']
        require_dnssec = false
        require_nolog = true
        require_nofilter = true
        dnscrypt_servers = true
        doh_servers = true
        odoh_servers = false
        ipv6_servers = false
        bootstrap_resolvers = ['9.9.9.9:53', '1.1.1.1:53']
        timeout = 5000
        keepalive = 30
        log_level = 2
        use_syslog = false
        cache = true
        cache_size = 4096
        cache_min_ttl = 2400
        cache_max_ttl = 86400
        cache_neg_min_ttl = 60
        cache_neg_max_ttl = 600

        [sources]

        [static]
          [static.'nextdns-735278']
            # https://dns.nextdns.io/735278/pihole03
            # https://dnscrypt.info/stamps/
            stamp = 'sdns://AgcAAAAAAAAAAAAOZG5zLm5leHRkbnMuaW8QLzczNTI3OC9waWhvbGUwMw'
#podDnsConfig:
#    enabled: true
#    policy: None
#    nameservers:
#        - 1.1.1.1
#        - 127.0.0.1
capabilities:
    add:
        - NET_ADMIN
        - CAP_SYS_NICE
persistentVolumeClaim:
    enabled: true
    size: 1Gi
    #existingClaim: pihole-02
dnsmasq:
    # Disabled entries are kept here as comments OUTSIDE customDnsEntries; do NOT
    # move them back as commented list items, as comments in an encrypted
    # sequence break the SOPS MAC. Disabled entries for reference:
    #   - 'address=/.neese-web.de/::'
    #   - 'address=/.k8s.neese-web.de/::'
    #   - 'address=/.internal.neese-web.de/::'
    #   - address=/youtubei.googleapis.com/216.239.38.119
    #   - address=/youtubei.googleapis.com/2001:4860:4802:32::77
    #   - address=/www.youtube.com/216.239.38.119
    #   - address=/www.youtube.com/2001:4860:4802:32::77
    #   - address=/m.youtube.com/216.239.38.119
    #   - address=/m.youtube.com/2001:4860:4802:32::77
    #   - address=/youtube.googleapis.com/216.239.38.119
    #   - address=/youtube.googleapis.com/2001:4860:4802:32::77
    #   - address=/www.youtube-nocookie.com/216.239.38.119
    #   - address=/www.youtube-nocookie.com/2001:4860:4802:32::77
    customDnsEntries:
        - ENC[AES256_GCM,data:Sd2NYA4+4ea1IEQk7bhnAe2e3bvT9TH8Gv+uG95L2jhzyl8=,iv:iTJF8JHmjsv9QF89Zi7cUYg74i+jYsPDr9wL5wje578=,tag:qefbNym6hfGbwcSoB45jNw==,type:str]
        - ENC[AES256_GCM,data:Py0uMBd6MkSe9ZQ5lVjf79jAwMHwokk1vV9S6eJadJCxQKAocSlg7w==,iv:4i235sgwlX8jEF0/ZD+LVI5n83GQ2qdqvFANrkyv/ow=,tag:MklRMu+GKlDX+DGV8BH2Kw==,type:str]
        - ENC[AES256_GCM,data:MWp1DBLcrESez/APtwPOHKDwYMUcxTtihz9Sq2lC75jOgwapYkRbdfBOROsP,iv:n/ZxXdDBFxs3QZPHy6t+rQH1B3nLd6unuFSB90iEdss=,tag:DG0eouhY2TTpPo5TyeKYiQ==,type:str]
    customSettings:
        - dhcp-option=252,"\n"
        - dhcp-option=vendor:MSFT,2,1i
        # DNS
        #- dhcp-option=6,192.168.1.232,192.168.1.1
        - dhcp-option=6,192.168.1.232
        # NTP
        - dhcp-option=42,192.168.1.1
        - dhcp-range=::,ra-names
        - server=/geekbundle.org/192.168.1.1
        - ptr-record=1.1.168.192.in-addr.arpa.,"despair"
        # TFTP Boot
        - dhcp-match=set:ipxe,175
        - dhcp-boot=tag:!ipxe,ipxe.pxe,dns01,192.168.1.45
        - dhcp-match=set:efi-x86_64,option:client-arch,7
        - dhcp-boot=tag:efi-x86_64,ipxe.efi,dns01,192.168.1.45
        - dhcp-boot=http://192.168.1.45:8043/boot.ipxe
        # DHCP Reservation with different dns server
        - dhcp-option=net:customdns,6,9.9.9.9,1.1.1.1
        - dhcp-host=net:customdns,EC:79:49:51:64:16,192.168.1.187,ipl06002-lan
        - dhcp-host=net:customdns,F4:4E:E3:2C:C2:B6,192.168.1.56,ipl06002-wlan
        # DHCP Reservation with unrestricted youtube dns server
        - dhcp-option=net:youtubedns,6,192.168.1.234
        - dhcp-host=net:youtubedns,AC:3E:B1:A6:AF:D6,Pixel-7-Pro
        - dhcp-host=net:youtubedns,E0:80:6B:37:56:83,Redmi-Note-11
        - dhcp-host=net:youtubedns,74:58:F3:E7:3A:04,Fire-Cube-lan
        - dhcp-host=net:youtubedns,48:43:DD:6E:CC:2D,Fire-Cube-wlan
        - dhcp-host=net:youtubedns,F0:27:2D:D7:41:97,Fire-Guest
        - dhcp-host=net:youtubedns,00:e0:4c:7b:c2:98,Sanctuary
        - dhcp-host=net:youtubedns,8c:8c:aa:32:ce:7a,IONB000201752-LAN
        - dhcp-host=net:youtubedns,4e:80:5d:ae:a9:dd,IONB000201752-WLAN
