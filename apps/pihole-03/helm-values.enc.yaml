podSecurityContext:
    seccompProfile:
        type: RuntimeDefault
containerSecurityContext:
    privileged: false
    capabilities:
        add:
            - NET_ADMIN
            - SYS_NICE
# Reschedule faster on ungraceful node failure. Together with Longhorn's
# nodeDownPodDeletionPolicy this lets the pod move off a dead node instead of
# waiting for the default 300s unreachable/not-ready toleration.
tolerations:
    - key: node.kubernetes.io/unreachable
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 30
    - key: node.kubernetes.io/not-ready
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 30
