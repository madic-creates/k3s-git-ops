---
# code-server Network Policy
# Allows web UI access via Traefik and egress for extension marketplace / git
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: codeserver
  namespace: codeserver
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: code-server
  ingress:
  # Allow ingress from Traefik for web UI access
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/instance: traefik-kube-system
        k8s:io.kubernetes.pod.namespace: kube-system
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  # Allow Authelia to reach code-server for forward auth validation
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/name: authelia
        k8s:io.kubernetes.pod.namespace: authelia
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  egress:
  # Allow DNS resolution via CoreDNS
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  # Allow HTTPS / HTTP / SSH / Git egress to the internet
  # - Open VSX / Microsoft extension marketplace
  # - git clone/push over HTTPS and SSH
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
      - port: "80"
        protocol: TCP
      - port: "22"
        protocol: TCP
