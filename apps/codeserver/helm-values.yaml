---
# code-server Helm chart values
# Upstream chart: https://github.com/coder/code-server/tree/main/ci/helm-chart
# Docs: https://coder.com/docs/code-server/helm

image:
  repository: ghcr.io/madic-creates/code-server-toolbox
  tag: 'latest@sha256:f65facb867925a32ce8a5146df1ab14ef07bf4f6e9514177e7646dbd37fff6a7'
  pullPolicy: IfNotPresent

# Auth disabled — code-server is fronted by Authelia via the Ingress.
# The chart still generates a random PASSWORD secret, but `--auth none`
# makes code-server ignore it.
fullnameOverride: codeserver

serviceAccount:
  # The ServiceAccount is provisioned by the resources Application
  # (apps/codeserver/k8s.serviceaccount.yaml) with
  # automountServiceAccountToken: false — code-server doesn't talk to the k8s
  # API, so the default token is pure attack surface.
  create: false
  name: codeserver

podSecurityContext:
  fsGroup: 1000

extraArgs:
  - --auth
  - none
  - --disable-telemetry
  - --disable-update-check

extraVars:
  - name: TZ
    value: Europe/Berlin
  - name: DOCKER_USER
    value: coder
  # Force git to use the SSH key that the ssh-perms initContainer copies into
  # /opt/codeserver-ssh (owned by UID 1000, mode 0600 — satisfies OpenSSH's
  # permission checks).
  - name: GIT_SSH_COMMAND
    value: "ssh -i /opt/codeserver-ssh/id_ed25519 -o UserKnownHostsFile=/opt/codeserver-ssh/known_hosts -o IdentitiesOnly=yes"

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 2Gi

persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 10Gi

# SSH key for git access: the raw Secret is mounted read-only, then an init
# container copies the files into a tmpfs emptyDir with the permissions
# OpenSSH requires (owner = UID 1000, mode 0600).
extraSecretMounts:
  - name: ssh-secret
    mountPath: /mnt/ssh-secret
    secretName: codeserver-ssh
    readOnly: true
    defaultMode: 0440

extraVolumeMounts:
  - name: ssh-ready
    mountPath: /opt/codeserver-ssh
    readOnly: true
    emptyDir:
      medium: Memory
      sizeLimit: 1Mi

extraInitContainers: |
  - name: ssh-perms
    image: busybox:1.37
    imagePullPolicy: IfNotPresent
    command:
      - sh
      - -c
      - |
        set -eu
        install -m 0600 /mnt/ssh-secret/id_ed25519 /mnt/ssh-ready/id_ed25519
        install -m 0644 /mnt/ssh-secret/known_hosts /mnt/ssh-ready/known_hosts
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    volumeMounts:
      - name: ssh-secret
        mountPath: /mnt/ssh-secret
        readOnly: true
      - name: ssh-ready
        mountPath: /mnt/ssh-ready
