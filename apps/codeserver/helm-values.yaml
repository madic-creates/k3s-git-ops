---
# code-server Helm chart values
# Upstream chart: https://github.com/coder/code-server/tree/main/ci/helm-chart
# Docs: https://coder.com/docs/code-server/helm

image:
  repository: ghcr.io/madic-creates/code-server-toolbox
  tag: 'latest@sha256:f65facb867925a32ce8a5146df1ab14ef07bf4f6e9514177e7646dbd37fff6a7'
  pullPolicy: IfNotPresent

# Auth disabled — code-server is fronted by Authelia via the Ingress.
# The chart still generates a random PASSWORD secret, but `--auth none`
# makes code-server ignore it.
fullnameOverride: codeserver

serviceAccount:
  create: true
  name: codeserver

podSecurityContext:
  fsGroup: 1000

extraArgs:
  - --auth
  - none
  - --disable-telemetry
  - --disable-update-check

extraVars:
  - name: TZ
    value: Europe/Berlin
  - name: DOCKER_USER
    value: coder

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 2Gi

persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 10Gi
