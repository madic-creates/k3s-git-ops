apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-tv
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-tv
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-tv
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-tv
subjects:
  - kind: ServiceAccount
    name: cluster-tv
    namespace: monitoring
