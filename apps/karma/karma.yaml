alertmanager:
  interval: 30s
  servers:
    - name: kube-prometheus-stack
      uri: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
      external_uri: https://alertmanager.internal.neese-web.de
      timeout: 20s
      # Proxy silence/group requests through karma's backend so the browser
      # never has to call alertmanager directly (avoids cross-subdomain CORS
      # and a second Authelia auth on alertmanager.internal.neese-web.de).
      proxy: true
      # Dead man's switch: kube-prometheus-stack ships an always-firing
      # "Watchdog" alert (severity=none). If it disappears the alerting
      # pipeline (Prometheus -> Alertmanager -> karma) is broken; karma will
      # surface a warning in the UI. visible defaults to false so the
      # heartbeat alert itself stays out of the regular alert list.
      healthcheck:
        filters:
          watchdog:
            - alertname=Watchdog
            - severity=none
# Authentication is enforced by Authelia ForwardAuth on Traefik.
# Karma trusts the Remote-User header it sets so silences are attributed.
authentication:
  header:
    name: Remote-User
    value_re: ^(.+)$
listen:
  address: 0.0.0.0
  port: 8080
log:
  level: info
# One-click ack: turns the alert group into a short-lived silence
# attributed to the Authelia Remote-User. Lets us mute noise without
# opening the full silence form. 30m fits a homelab; pair with kthxbye
# later if we need silences to auto-extend while the alert keeps firing.
alertAcknowledgement:
  enabled: true
  duration: 30m
  author: karma
  comment: ACK via karma on %NOWLOC%
# Default the UI to active alerts only; silenced/inhibited stay one click away.
filters:
  default:
    - "@state=active"
# Drop volatile labels from the silence form so a silence survives a pod
# reschedule. They stay visible in the alert view; only the silence
# matcher is broadened.
silenceForm:
  strip:
    labels:
      - pod
      - instance
labels:
  # kube-prometheus-stack attaches a lot of plumbing labels that add no
  # triage value. Hide them in the UI; alertname/severity/namespace etc.
  # are what we actually look at.
  strip:
    - endpoint
    - container
    - prometheus
    - service
    - job
  color:
    # Same color for every namespace value so alerts from the same
    # workload visually cluster.
    static:
      - namespace
    # Fixed severity colors matching the kube-prometheus-stack levels
    # (critical/warning/info/none).
    custom:
      severity:
        - value: critical
          color: "#ff220c"
        - value: warning
          color: "#ffae42"
        - value: info
          color: "#87c4e0"
        - value: none
          color: "#736598"
ui:
  # Split the grid by severity — critical/warning/info each get their own
  # column. Biggest triage win on a single-cluster setup.
  multiGridLabel: severity
