## Service Account
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mariadb-backup-serviceaccount
  namespace: databases
## Role with permissions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: databases
  name: mariadb-backup-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
## Bind role and service account
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mariadb-backup-rolebinding
  namespace: databases
subjects:
  - kind: ServiceAccount
    name: mariadb-backup-serviceaccount
    namespace: databases
roleRef:
  kind: Role
  name: mariadb-backup-role
  apiGroup: rbac.authorization.k8s.io
## CronJob
### Backup is done this way because for best compatibility mariadb-backup must be the same version as the server
### Alternatively I could use the mariadb container image, but need to remember to update it as well when updating the container
### This way I always get the correct mariadb-backup version by just using mariadb-backup within the mariadb container
###
### The processes need to run sequential and not parallel. Therefor mariadb-backup runs as an initContainer and restic as a normal container
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-mariadb
  namespace: databases
spec:
  schedule: "10 0-1,3-23 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 540
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-mariadb
            app.kubernetes.io/component: backup
        spec:
          # automountServiceAccountToken stays at the default true — the
          # initContainer needs the token to run kubectl exec into the
          # mariadb pod for the dump.
          serviceAccountName: mariadb-backup-serviceaccount
          restartPolicy: Never
          initContainers:
            - name: kubectl-mariadb-backup
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  POD_NAME=$(kubectl get pods -n databases -l app.kubernetes.io/name=mariadb -o jsonpath="{.items[0].metadata.name}")
                  kubectl exec -n databases $POD_NAME -- bash -c "rm -f /backup/mariadb.xb && mariadb-backup --skip-ssl-verify-server-cert --host 127.0.0.1 --user=root --password=\$(cat \$MARIADB_ROOT_PASSWORD_FILE) --backup --target-dir=/backup --stream=xbstream > /backup/mariadb.xb"
          containers:
            - name: restic
              image: ghcr.io/madic-creates/container-restic:latest@sha256:c5786cdded119d4bf44680e95f54a4cbb0f89ddb05eab83937709f0b6338a811
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /usr/local/bin/backup.sh
              env:
                - name: HOME
                  value: /home/restic
              envFrom:
                - secretRef:
                    name: backup-env-configuration-mariadb
              volumeMounts:
                - name: backup-script
                  mountPath: /usr/local/bin/backup.sh
                  subPath: backup.sh
                - name: backup
                  mountPath: /backup
                  readOnly: true
                - name: home
                  mountPath: /home/restic
              # Match the bitnami/mariadb image UID (1001) so restic can
              # read the dump file written by the initContainer's
              # kubectl-exec'd mariadb-backup process.
              securityContext:
                runAsUser: 1001
                runAsGroup: 1001
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: longhorn-pvc-mariadb-backupvolume
            - name: backup-script
              configMap:
                name: crontab-backup-script
            - name: home
              emptyDir:
                medium: Memory
                sizeLimit: 200Mi
