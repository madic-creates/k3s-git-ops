                - ENC[AES256_GCM,data:CkCzvheNaTgZjocbLsvaDIg8qhy7oupa+J9HZQ==,iv:j1+Ni607BSV5JtPI6Qksc2ZtOQeKhYN4bfeyoVSu1Mw=,tag:CXfMikDiX34/5U+2wv7CNg==,type:str]
              secretName: wildcard-cloudflare-production-02
repoServer:
    # Use init containers to configure custom tooling
    # https://argoproj.github.io/argo-cd/operator-manual/custom_tools/
    volumes:
        - name: custom-tools
          emptyDir: {}
        - name: sops-age
          secret:
            secretName: sops-age
        - name: cmp-tmp
          emptyDir: {}
        - name: cmp-sops-plugin
          configMap:
            name: argocd-cmp-sops-plugin
    initContainers:
        - name: install-ksops
          # https://github.com/viaduct-ai/kustomize-sops/releases
          image: viaductoss/ksops:v4.3.2
          command:
            - /bin/sh
            - -c
          args:
            - echo "Installing KSOPS..."; cp ksops /custom-tools/; cp kustomize /custom-tools/; echo "Done.";
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
        - name: install-sops
          # https://github.com/getsops/sops/pkgs/container/sops/versions?filters%5Bversion_type%5D=tagged
          image: ghcr.io/getsops/sops:v3.9.3-alpine
          command:
            - /bin/sh
            - -c
          args:
            - echo "Installing SOPS..."; cp /usr/local/bin/sops /custom-tools/; echo "Done.";
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
        - name: install-helm
          # https://hub.docker.com/r/alpine/helm/tags
          image: alpine/helm:3.16.4
          command:
            - /bin/sh
            - -c
          args:
            - echo "Installing helm..."; cp /usr/bin/helm /custom-tools/; echo "Done.";
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
        - name: install-kustomize
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
          args:
            - wget -qO- https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz | tar -xvzf - && mv kustomize /custom-tools/
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
        - name: install-helm-secrets
          # https://github.com/jkroepke/helm-secrets/releases
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
          args:
            - mkdir -p /custom-tools/helm-plugins && wget -qO- https://github.com/jkroepke/helm-secrets/releases/download/v4.7.6/helm-secrets.tar.gz | tar -C /custom-tools/helm-plugins -xzf-
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
    extraContainers:
        - name: cmp-sops-plugin
          command:
            - /var/run/argocd/argocd-cmp-server
          # https://hub.docker.com/_/alpine/tags
          image: alpine:3.20.3
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: plugin.yaml
              name: cmp-sops-plugin
            # Starting with v2.4, do NOT mount the same tmp volume as the repo-server container. The filesystem separation helps mitigate path traversal attacks.
            - mountPath: /tmp
              name: cmp-tmp
            - mountPath: /usr/local/bin/kustomize
              name: custom-tools
              subPath: kustomize
            - mountPath: /usr/local/bin/ksops
              name: custom-tools
              subPath: ksops
            - mountPath: /usr/local/bin/sops
              name: custom-tools
              subPath: sops
            - mountPath: /usr/local/bin/helm
              name: custom-tools
              subPath: helm
            - mountPath: /.config/sops/age
              name: sops-age
              readOnly: true
    volumeMounts:
        # ksops packages it's own kustomize binary with ksops integration and overrides the argocd kustomize binary
        - mountPath: /usr/local/bin/kustomize
          name: custom-tools
          subPath: kustomize
        - mountPath: /usr/local/bin/ksops
          name: custom-tools
          subPath: ksops
        - mountPath: /usr/local/bin/sops
          name: custom-tools
          subPath: sops
        - mountPath: /helm-plugins
          name: custom-tools
          subPath: helm-plugins
        - mountPath: /.config/sops/age
          name: sops-age
          readOnly: true
    env:
        - name: SOPS_AGE_KEY_FILE
          value: /.config/sops/age/keys.txt
        - name: HELM_PLUGINS
          value: /helm-plugins/
        - name: HELM_SECRETS_BACKEND
          value: sops
        - name: HELM_SECRETS_VALUES_ALLOW_ABSOLUTE_PATH
          value: "true"
        - name: HELM_SECRETS_WRAPPER_ENABLED
          value: "true"
# The application controller needs limits because it quickly gets out of control when checking the configured resources.
controller:
    resources:
        limits:
            cpu: 1024m
            memory: 1024Mi
        requests:
            cpu: 250m
            memory: 256Mi
    affinity:
        podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - emby
                  topologyKey: kubernetes.io/hostname
