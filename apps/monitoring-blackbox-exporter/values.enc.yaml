# Self-monitor the blackbox-exporter (chart-internal /metrics).
serviceMonitor:
    selfMonitor:
        enabled: true
        interval: 60s
        scrapeTimeout: 10s
    # One ServiceMonitor per entry below. The chart turns each into a scrape
    # config that calls the blackbox-exporter Service with `?target=...&module=...`.
    # Target names are deliberately generic so the file stays committable —
    # the actual hostnames live in the SOPS-encrypted `url` / `hostname` fields.
    # Resolve names via `sops -d` when correlating with metrics.
    enabled: true
    defaults:
        interval: 3m
        scrapeTimeout: 10s
        module: http_2xx
    targets:
        # ----- HTTP(S) reachability + TLS cert checks, every 3 minutes -----
        # Module http_2xx follows redirects, accepts default 2xx, prefers IPv4.
        # For HTTPS URLs the http prober also performs the TLS handshake, so
        # probe_ssl_earliest_cert_expiry / probe_ssl_last_chain_expiry are
        # exported from the same scrape — no separate cert-only probe needed.
        - name: http-01
          url: ENC[AES256_GCM,data:hSkudpCPVKPWlGZpAnClLOV98fdC5LEjyQ==,iv:HrpWJhm/W1f4gFvUaGgYoD1jrsg05sCIuBBhDInWniE=,tag:urhokLwQOGlf9YYAGPAqZQ==,type:str]
        - name: http-02
          url: ENC[AES256_GCM,data:mSfo0Z9d1JyJ+O0USR2T7iBOQVIAZqo2fcjF,iv:BGs+aSczdqHiZCGZNMofwdkWh9NzTtYnbvF0BpM6i6E=,tag:OvrH9nuw/6UKLekZiXOOeg==,type:str]
        - name: http-03
          url: ENC[AES256_GCM,data:3ipccsmGTMUSS4R4KUOPCIe2IrOmbbiP,iv:8cXv5eyGow1dQThkKrDM1uTOfP6BAiz/dADjekTSBdk=,tag:FmaERi9Du+nxPFDY6LP7pw==,type:str]
        - name: http-04
          url: ENC[AES256_GCM,data:/jD52qlMEjzhvcNl4v3FmUMMtfBshREYFfZSskA=,iv:o+m9gJDw3b/Oq8Tuc6zXftDB2dvxTtTFkJ3BZEeJmFU=,tag:MpwpnPs7qpyhCFU4rLFyEw==,type:str]
        - name: http-05
          url: ENC[AES256_GCM,data:TFg3ite6dw8Q5WMW3ggTir2nK6cN7UhKvr8=,iv:qPAfIva/df2qabKE/dyghVFc4c+k0Lm8ZFdz7jyk4PI=,tag:WD86KDKoWLrI60jIe5iuLA==,type:str]
        - name: http-06
          url: ENC[AES256_GCM,data:+p6mu6t3CetTIi92HqFmrH+rY8WV+YWIMq3z,iv:1yvXZogYpDa9Jw8b1Jw1NXuz1x6uRZ8qjs1ThfybdME=,tag:K+YPS2MrjN6QFXPbah1sNQ==,type:str]
        # ----- Special case: wildcard cert probed against a fixed IP. -----
        # The chart's target-level `hostname` parameter is forwarded to the
        # blackbox-exporter as a query string and tells the http prober which
        # name to use for both the SNI and the Host header. That lets us
        # validate the wildcard cert against an IP without DNS, while the
        # ingress at that hostname returns 2xx so the standard http_2xx
        # module applies and dashboards need no special handling.
        - name: cert-special-01
          url: ENC[AES256_GCM,data:Frxh3luieb1wDG7AneL0jIsiPEVcwg==,iv:ekFKNsCfDA6TqR4ugu/z1bQhb9zW/puDo4Tlp0OxxAE=,tag:cZoW25jQeMYz5K0Fszy7Ig==,type:str]
          hostname: ENC[AES256_GCM,data:5Hc4HvxE2gz7lTphJuO/x0GFsV9U,iv:Dm5/TdXHmMda5Yd/dUK++SeSsK9O5k5PF6pSeiFCbF8=,tag:3dAne7El/B8qN1FydqYCLg==,type:str]
# Probe modules.
config:
    modules:
        http_2xx:
            prober: http
            timeout: 5s
            http:
                valid_http_versions:
                    - HTTP/1.1
                    - HTTP/2.0
                follow_redirects: true
                preferred_ip_protocol: ip4
        http_post_2xx:
            prober: http
            timeout: 5s
            http:
                method: POST
        tcp_connect:
            prober: tcp
            timeout: 5s
        icmp:
            prober: icmp
            timeout: 5s
            icmp:
                preferred_ip_protocol: ip4
        # TLS handshake against the dialled hostname; SNI defaults to that hostname.
        tcp_connect_tls:
            prober: tcp
            timeout: 10s
            tcp:
                tls: true
                preferred_ip_protocol: ip4
resources:
    requests:
        cpu: 25m
        memory: 32Mi
    limits:
        memory: 128Mi
