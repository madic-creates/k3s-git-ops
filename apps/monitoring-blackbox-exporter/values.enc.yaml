# Self-monitor the blackbox-exporter (chart-internal /metrics).
serviceMonitor:
    selfMonitor:
        enabled: true
        interval: 60s
        scrapeTimeout: 10s
    # One ServiceMonitor per entry below. The chart turns each into a scrape
    # config that calls the blackbox-exporter Service with `?target=...&module=...`.
    # Target names are deliberately generic so the file stays committable —
    # the actual hostnames live in the SOPS-encrypted `url` / `server_name`
    # fields. Resolve names via `sops -d` when correlating with metrics.
    enabled: true
    defaults:
        interval: 3m
        scrapeTimeout: 10s
        module: http_2xx
    targets:
        # ----- HTTP(S) reachability checks, every 3 minutes -----
        # Module http_2xx follows redirects, accepts default 2xx, prefers IPv4.
        - name: http-01
          url: ENC[AES256_GCM,data:H5S/L4iGV4vVVJiOxURng2T6+8gwMfiktxs=,iv:goG/lslNDbVJMuJ6vquqzGBv1/wiEWQK6K5GoiP24dk=,tag:oEsWJHdLXQQpV+laHr7+Aw==,type:str]
        - name: http-02
          url: ENC[AES256_GCM,data:SojHd+kBTYaaAijUGsB5GuGY7X3UPJJ4EE0F,iv:bAoTNu5OWRfuLD+2CHaiu2SGGVY2OZGh4dUfRmk5KfY=,tag:VGOYO17W7zUZ5Ho0NOEwFQ==,type:str]
        - name: http-03
          url: ENC[AES256_GCM,data:iKfCl6SQq5IULDiXgR6u1vVanq3dGcnu,iv:MaCNjgqbkKrkpIYbzVK5nJCzDZ1P+zf2CPN24MRj89Y=,tag:Zf4nxlAXPcthZd9eDz7e3A==,type:str]
        - name: http-04
          url: ENC[AES256_GCM,data:bbJZ4hVn7WeNH21oG9C8YyUZfScL5m1lDcncLrk=,iv:0iIAQG+cmw+1Rkb0GaN7+g1AsO4RuY445mmR2Jd9VuI=,tag:RwdMg9CHt7zzfoSwFo4OTQ==,type:str]
        - name: http-05
          url: ENC[AES256_GCM,data:uyy64pRLGRlFpUVgBpPaZ+B5eFPEgV6QqZk=,iv:/kdL8z2szM8MuNGS5trXeCjJVkmPKiJHt6Ep7ZalCqk=,tag:ihX1Zol5CXQYfvZo/r4KpA==,type:str]
        - name: http-06
          url: ENC[AES256_GCM,data:/FYXK9F2aJMrWgcqB/QENeDapHbMchYWQlW1,iv:2LMCYH338siZyuIDRPEynJoKcr/X2RSVQF1e8gycgRs=,tag:km5wl3HksRs4mlMhMPILsg==,type:str]
        # ----- TLS-only certificate checks, every 6 hours -----
        # tcp_connect_tls performs a TCP+TLS handshake without an HTTP request,
        # exposing probe_ssl_earliest_cert_expiry / probe_ssl_last_chain_expiry.
        - name: cert-01
          url: ENC[AES256_GCM,data:1RE30O/p7Hahu3sheRZFBliqWKP86g==,iv:5IgAiWm2lGKj3AuZD7kZkbAlj//2a6CXd2PYyEeq7RA=,tag:yQRkyGw1uhCpEiWIdrihsQ==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-02
          url: ENC[AES256_GCM,data:0N5gDuXlKSKjaqA0Wpw1dK5jeo6oVNc=,iv:0zJAxVowavPOvHRNQWoeTTcLrhv6gVoLFCgqEHtLMLg=,tag:JlVe2SXB86iBMEwadzBr1A==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-03
          url: ENC[AES256_GCM,data:hAyhmEGfBSV6FJO7yLRnUvEFHxs=,iv:Er30/JJZBuBqyDL5dwsG/c8aGIA3BBeBXjn9s+SUPq4=,tag:EBhrIlGt4pnZ6yhtYL2p2w==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-04
          url: ENC[AES256_GCM,data:HQ90cuGLAessBZDvIlP/8zpZmIzcTG7/MA==,iv:U7RLIK8poWiPKJkWuUVXTSzxj+7df3uJcxETaqe7MRI=,tag:qHChTBBcD10ZiwwMPyk/gw==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-05
          url: ENC[AES256_GCM,data:31Pzy+QomQxqXKWQvgcxys1Tvy8Ndw==,iv:bz466Makpz/fau/AEidsDHaQANThg97b8BUGj3w8e3s=,tag:6zfU8IqlIga/mrBL6rQVuw==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-06
          url: ENC[AES256_GCM,data:67svBukGUqABVJ6Y5f3oJiWZrMMelh8=,iv:O23e1dXKIWPYpn11vBby9JSxJS+pjko90yTsHT8w5/g=,tag:8LqR02I9M+KlWYpv81gjTA==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        # ----- Special case: wildcard cert probed against a fixed IP. The chart's
        # target-level `hostname` parameter only applies to the HTTP prober and is
        # not honoured by the TCP prober, so the SNI server name is fixed in the
        # dedicated module below (encrypted in `server_name`). -----
        - name: cert-special-01
          url: ENC[AES256_GCM,data:mTgRabw+/ScypIUUp9jrbG/W,iv:MRYm59oi/z1sjQeD1e11SF/+vWwAEcPerCtJe7vKRdc=,tag:reHAlSiJj/kYdSeTet6l0A==,type:str]
          module: tcp_connect_tls_with_sni
          interval: 6h
          scrapeTimeout: 15s
# Probe modules.
config:
    modules:
        http_2xx:
            prober: http
            timeout: 5s
            http:
                valid_http_versions:
                    - HTTP/1.1
                    - HTTP/2.0
                follow_redirects: true
                preferred_ip_protocol: ip4
        http_post_2xx:
            prober: http
            timeout: 5s
            http:
                method: POST
        tcp_connect:
            prober: tcp
            timeout: 5s
        icmp:
            prober: icmp
            timeout: 5s
            icmp:
                preferred_ip_protocol: ip4
        # TLS handshake against the dialled hostname; SNI defaults to that hostname.
        tcp_connect_tls:
            prober: tcp
            timeout: 10s
            tcp:
                tls: true
                preferred_ip_protocol: ip4
        # TLS handshake with an explicit SNI server name (encrypted). Used when
        # probing an IP directly to validate a wildcard certificate.
        tcp_connect_tls_with_sni:
            prober: tcp
            timeout: 10s
            tcp:
                tls: true
                tls_config:
                    server_name: ENC[AES256_GCM,data:dXKY1A3JqGZoMHGDcauVUkjA6gT31Q==,iv:MoMbX8PpMCHWaEpOdAw1N0InSA1csQHGgNhaplzRi5s=,tag:84Z1FBpvOAZnvDwigP6zyA==,type:str]
                preferred_ip_protocol: ip4
resources:
    requests:
        cpu: 25m
        memory: 32Mi
    limits:
        memory: 128Mi
