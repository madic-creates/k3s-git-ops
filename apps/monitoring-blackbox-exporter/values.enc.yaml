# Self-monitor the blackbox-exporter (chart-internal /metrics).
serviceMonitor:
    selfMonitor:
        enabled: true
        interval: 60s
        scrapeTimeout: 10s
    # One ServiceMonitor per entry below. The chart turns each into a scrape
    # config that calls the blackbox-exporter Service with `?target=...&module=...`.
    # Target names are deliberately generic so the file stays committable —
    # the actual hostnames live in the SOPS-encrypted `url` / `hostname` fields.
    # Resolve names via `sops -d` when correlating with metrics.
    enabled: true
    defaults:
        interval: 3m
        scrapeTimeout: 10s
        module: http_2xx
    targets:
        # ----- HTTP(S) reachability + TLS cert checks, every 3 minutes -----
        # Module http_2xx follows redirects, accepts default 2xx, prefers IPv4.
        # For HTTPS URLs the http prober also performs the TLS handshake, so
        # probe_ssl_earliest_cert_expiry / probe_ssl_last_chain_expiry are
        # exported from the same scrape — no separate cert-only probe needed.
        - name: http-01
          url: ENC[AES256_GCM,data:nVxqCMtOGpi800ItqLLbrecckbdlffKomQ==,iv:KoAXuRL+oGbirw3zldF2dvh2nh6X7Vt0ah2d5Tnk8vU=,tag:LILpW2+Z7QwNnNHASQFcYw==,type:str]
        - name: http-02
          url: ENC[AES256_GCM,data:PPtXwhGP0rzvRqVV9y1aBYleZ+gf990htsB7,iv:rvVKZPQ0mwUEedgUdE88a+rg70dNnhLb4eIOX/7iCb0=,tag:Zlzc7AvKKB05hye1NZLbgw==,type:str]
        - name: http-03
          url: ENC[AES256_GCM,data:anAwdURFWN2XkMsTJ3Iw1lGv+Zb7c8a3,iv:K+L9WDaY+VrpVDhXOUAkTh+xuE3LGNbKcXLGntxD3W0=,tag:TSUC4KdjORuZUHqXLML/fQ==,type:str]
        - name: http-05
          url: ENC[AES256_GCM,data:QJi+LtkZysiyXSpMyh2CTGg9btmPFWoOH5g=,iv:LS1XBPt5rszolpf9D7kTlrFlDIScu9x22lyoBkHUuQY=,tag:OXMA7gc5jG4JNixNfdpBGg==,type:str]
        - name: http-06
          url: ENC[AES256_GCM,data:AD58kSj6+y3gooO4ujgWgYNPQMBYbybnTZ44,iv:m69yRrtV2psbD/DqPk4EOwC3ypn20534gUjea/zzvUY=,tag:G8Oq+qPYnzLhMoQTHaKWcg==,type:str]
        # ----- Special case: wildcard cert probed against a fixed IP. -----
        # The chart's target-level `hostname` parameter is forwarded to the
        # blackbox-exporter as a query string and tells the http prober which
        # name to use for both the SNI and the Host header. That lets us
        # validate the wildcard cert against an IP without DNS, while the
        # ingress at that hostname returns 2xx so the standard http_2xx
        # module applies and dashboards need no special handling.
        - name: cert-special-01
          url: ENC[AES256_GCM,data:BIX6kYw5IN4y14SLEeNJ5njSYkRhVA==,iv:vHLlzHljAKivdgiXbI9/bg5vBIZvg80olBXOJ138O20=,tag:FzrWlg6yYpV0HdRee8sl6w==,type:str]
          hostname: ENC[AES256_GCM,data:Ccj9TnQgDoeZQnf6zTK6pwB7HXRT,iv:P+0hZOMbW1RmuTcrXcP6wY8CaTw+ROHRkvSlkeytAHY=,tag:ft1qt/8Fw/TaxT0EJVGgEA==,type:str]
# Probe modules.
config:
    modules:
        http_2xx:
            prober: http
            timeout: 5s
            http:
                valid_http_versions:
                    - HTTP/1.1
                    - HTTP/2.0
                follow_redirects: true
                preferred_ip_protocol: ip4
        http_post_2xx:
            prober: http
            timeout: 5s
            http:
                method: POST
        tcp_connect:
            prober: tcp
            timeout: 5s
        icmp:
            prober: icmp
            timeout: 5s
            icmp:
                preferred_ip_protocol: ip4
        # TLS handshake against the dialled hostname; SNI defaults to that hostname.
        tcp_connect_tls:
            prober: tcp
            timeout: 10s
            tcp:
                tls: true
                preferred_ip_protocol: ip4
resources:
    requests:
        cpu: 25m
        memory: 32Mi
    limits:
        memory: 128Mi
