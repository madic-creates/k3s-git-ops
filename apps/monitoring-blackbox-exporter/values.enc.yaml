# Self-monitor the blackbox-exporter (chart-internal /metrics).
serviceMonitor:
    selfMonitor:
        enabled: true
        interval: 60s
        scrapeTimeout: 10s
    # One ServiceMonitor per entry below. The chart turns each into a scrape
    # config that calls the blackbox-exporter Service with `?target=...&module=...`.
    # Target names are deliberately generic so the file stays committable —
    # the actual hostnames live in the SOPS-encrypted `url` / `server_name`
    # fields. Resolve names via `sops -d` when correlating with metrics.
    enabled: true
    defaults:
        interval: 3m
        scrapeTimeout: 10s
        module: http_2xx
    targets:
        # ----- HTTP(S) reachability checks, every 3 minutes -----
        # Module http_2xx follows redirects, accepts default 2xx, prefers IPv4.
        - name: http-01
          url: ENC[AES256_GCM,data:UEkyb1dGkpyZ0YGoJHSfOygSZiw/h01JLQ==,iv:bk9F7r8mXVvAATTP3qB5mNss+JOXGWfFunJTjKuSrec=,tag:9XAccLggYT5IkKTk6GXO2w==,type:str]
        - name: http-02
          url: ENC[AES256_GCM,data:WDKTMEENCLKUB6MCRiqeluAmnTENPntR5vna,iv:+Io8G32x8mxA8Yxqus3lFbDCxdHb7+RDSWVL9tOWe/4=,tag:tJLTNJuuOXYjRos4lHvfAQ==,type:str]
        - name: http-03
          url: ENC[AES256_GCM,data:NtL2v9qpwvbG2RJy8XJm0w5611P4OVUW,iv:rABVQzT7SEzTF/75ZnFasLHP6qTOGh7J9pUT/w+bCf4=,tag:raHAE77RXOXEQE7LE5FOrQ==,type:str]
        - name: http-04
          url: ENC[AES256_GCM,data:F8aUcMbav+bdrpn9ah0ELGgmebYaaYpAz30Tu+c=,iv:F8Y05kS4iucFhkfe8yar2uMIubp4qLPTLnDdkASmD78=,tag:/VvaS/0FuG9i+ukkxvg4eQ==,type:str]
        - name: http-05
          url: ENC[AES256_GCM,data:usFlFtkk6I73TTM8PnIV5oq/VRRjelnbxG4=,iv:QEAeif6QoJGkZSRxg2UZ3HuK1NQC/Mzoc9cHN9g7/Rc=,tag:MjTozb0e9XPMjrp+cFBDHQ==,type:str]
        - name: http-06
          url: ENC[AES256_GCM,data:m/uxe7IczbcZrCGd2ZHzaljF2HDceqricOPi,iv:HTnyqsnaYKStH7lyDiUZAMucDIwToOKSfdPm2y7kYp0=,tag:mWaOXQskWFPF6ISQ68gQLA==,type:str]
        # ----- TLS-only certificate checks, every 6 hours -----
        # tcp_connect_tls performs a TCP+TLS handshake without an HTTP request,
        # exposing probe_ssl_earliest_cert_expiry / probe_ssl_last_chain_expiry.
        - name: cert-01
          url: ENC[AES256_GCM,data:jrc1mebnTb1TwZLJfJpVdYbUdhfv,iv:zl4mOqQmbGpwkdzjyLgYR5zz1zHsFRZe3ZJtWC9uif0=,tag:C2Kcm870uKZwL/FKAQ/o0A==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-02
          url: ENC[AES256_GCM,data:91EUpJ0ELUebcHrr5AmQtIBp3LF2A7U=,iv:MaYU3//zTZdHqCbbV+yojD2n1F1cAGFtgY0lHkFntbI=,tag:5Eprk3nBfOL07sPAHPeNeA==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-03
          url: ENC[AES256_GCM,data:ma1IF6blu5P4JAhhLn/jJRIWQi4=,iv:39+09YzlAHYZB492VazjmQPeIg7iZaowqxj8sZ/wOes=,tag:28VWWBUcaWt+uXSPfU0MvQ==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-04
          url: ENC[AES256_GCM,data:fAOjl2mj/MQc1L8IAREWjj5HuazZ9Y/XAQ==,iv:QCpSaaIuCBAV5uQ1DPnJ7C4lX2wUntZDwOm8QhVzpx0=,tag:tSkn2xrbiN9+XcMKsnYnIg==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-05
          url: ENC[AES256_GCM,data:J5D0TbNVREaoMXi7odLSvIWqBZiT6Q==,iv:BnbOXaAyPWGiwTSetp99irQsuyN3a/2/775bQOzCm8s=,tag:j8mlI1lBu3j4CjlE000YFA==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        - name: cert-06
          url: ENC[AES256_GCM,data:uEZ1Cbenb3wkBTfl8OUN7bu7+aMmbtM=,iv:soD1RpzkdCsXH76Viq8oBsY34T7Sj7xF+RWrUv0s/84=,tag:U+rEV5fgKTtfuqNmRfkT4A==,type:str]
          module: tcp_connect_tls
          interval: 6h
          scrapeTimeout: 15s
        # ----- Special case: wildcard cert probed against a fixed IP. The chart's
        # target-level `hostname` parameter only applies to the HTTP prober and is
        # not honoured by the TCP prober, so the SNI server name is fixed in the
        # dedicated module below (encrypted in `server_name`). -----
        - name: cert-special-01
          url: ENC[AES256_GCM,data:Xj/hwD8XYSQvPVuJkIkKH1jv,iv:umZKcRTbRfgJ0XqdIr8us+JECYQ2pqONe8ofWHJ/oZ8=,tag:bujqNxKrgJtJB1E88NQVXg==,type:str]
          module: tcp_connect_tls_with_sni
          interval: 6h
          scrapeTimeout: 15s
# Probe modules.
config:
    modules:
        http_2xx:
            prober: http
            timeout: 5s
            http:
                valid_http_versions:
                    - HTTP/1.1
                    - HTTP/2.0
                follow_redirects: true
                preferred_ip_protocol: ip4
        http_post_2xx:
            prober: http
            timeout: 5s
            http:
                method: POST
        tcp_connect:
            prober: tcp
            timeout: 5s
        icmp:
            prober: icmp
            timeout: 5s
            icmp:
                preferred_ip_protocol: ip4
        # TLS handshake against the dialled hostname; SNI defaults to that hostname.
        tcp_connect_tls:
            prober: tcp
            timeout: 10s
            tcp:
                tls: true
                preferred_ip_protocol: ip4
        # TLS handshake with an explicit SNI server name (encrypted). Used when
        # probing an IP directly to validate a wildcard certificate.
        tcp_connect_tls_with_sni:
            prober: tcp
            timeout: 10s
            tcp:
                tls: true
                tls_config:
                    server_name: ENC[AES256_GCM,data:y1jkjCqOJ6X2OZNtazbOKm1/PkHG3A==,iv:VsxFG0dbJN5p1Pfus8pcWl5KWdbMnzGlCagsqJPnHa0=,tag:bQhaQ6IqGJKjWIwun0KAzg==,type:str]
                preferred_ip_protocol: ip4
resources:
    requests:
        cpu: 25m
        memory: 32Mi
    limits:
        memory: 128Mi
