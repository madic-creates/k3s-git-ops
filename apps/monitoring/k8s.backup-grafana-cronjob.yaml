---
# Hourly Grafana backup via restic.
# Co-located with the Grafana pod via podAffinity because the underlying
# Longhorn PVC is ReadWriteOnce — both pods must run on the same node.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-grafana
  namespace: monitoring
spec:
  schedule: "20 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 540
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-grafana
            app.kubernetes.io/component: backup
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          # Match Grafana's UID/GID (472) so restic can read all files in
          # the PVC without privilege escalation. lost+found at the PVC root
          # is owned by root:root and excluded via RESTIC_ADDITIONAL_BACKUP_PARAMETERS.
          securityContext:
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
            runAsNonRoot: true
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: grafana
                  namespaces:
                    - monitoring
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: restic
              image: ghcr.io/restic/restic:0.18.1
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /usr/local/bin/backup.sh
              envFrom:
                - secretRef:
                    name: backup-env-configuration-grafana
              volumeMounts:
                - name: backup-script
                  mountPath: /usr/local/bin/backup.sh
                  subPath: backup.sh
                - name: grafana
                  mountPath: /backup/grafana
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
          volumes:
            - name: grafana
              persistentVolumeClaim:
                claimName: longhorn-pvc-grafana
            - name: backup-script
              configMap:
                name: crontab-backup-script
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backup-grafana
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: backup-grafana
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Prometheus Pushgateway (metrics)
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: monitoring
            k8s:io.kubernetes.pod.namespace: monitoring
            k8s:app.kubernetes.io/name: prometheus-pushgateway
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
    # Wasabi S3, ntfy, Alpine package repos
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
