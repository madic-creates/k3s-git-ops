# Grafana dashboard for backups pushed via prometheus-pushgateway by apps/backup-script.
# Discovered automatically by the Grafana sidecar via the grafana_dashboard label.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backup-script
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  backup-script.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "datasource", "uid": "grafana"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Restic backups pushed via prometheus-pushgateway by apps/backup-script",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "liveNow": false,
      "panels": [
        {
          "type": "stat",
          "title": "Hosts reporting",
          "description": "Number of hosts currently pushing backup metrics to the Pushgateway. Counts every distinct `backup_status{job=\"backup\"}` series regardless of success or failure. A drop here means a host stopped reporting entirely.",
          "id": 1,
          "gridPos": {"h": 3, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "count(backup_status{job=\"backup\"})", "refId": "A", "legendFormat": "hosts"}
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "blue", "value": null}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "Healthy",
          "description": "Hosts whose most recent backup ended successfully. Calculated as `count(backup_status{status=\"success\"} == 0)` — the metric value is the restic exit code, so 0 means success. Reflects only the latest pushed status and ignores age (see \"Stale\" for freshness).",
          "id": 2,
          "gridPos": {"h": 3, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "count(backup_status{job=\"backup\",status=\"success\"} == 0) or vector(0)", "refId": "A", "legendFormat": "healthy"}
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "Failed",
          "description": "Hosts whose most recent backup ended with a non-zero restic exit code. Calculated as `count(backup_status{status=\"failure\"} != 0)`. Only the latest pushed status counts — an old failure replaced by a later successful run is no longer reported here.",
          "id": 3,
          "gridPos": {"h": 3, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "count(backup_status{job=\"backup\",status=\"failure\"} != 0) or vector(0)", "refId": "A", "legendFormat": "failed"}
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "Stale (>26h)",
          "description": "Hosts whose last backup started more than 26 hours ago, regardless of status. Calculated as `count((time() - backup_start_timestamp) > 26*3600)`. The 26h threshold gives a 2h grace window over the daily backup schedule. A failed-but-fresh host is not stale; a successful-but-old one is.",
          "id": 4,
          "gridPos": {"h": 3, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "count((time() - backup_start_timestamp{job=\"backup\"}) > 26*3600) or vector(0)", "refId": "A", "legendFormat": "stale"}
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "type": "table",
          "title": "Backups per host",
          "description": "Snapshot of the most recent backup run per host. Each row joins five instant queries on `instance`: status text (success/failure), restic exit code, run duration, age of the last run, and absolute start/end timestamps (end = start + duration). The Pushgateway only retains the latest push per host, so this table is not a history — see the time-series panels below for trends.",
          "id": 5,
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 3},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "backup_status{job=\"backup\"}", "format": "table", "instant": true, "refId": "A"},
            {"expr": "backup_duration_seconds{job=\"backup\"}", "format": "table", "instant": true, "refId": "B"},
            {"expr": "time() - backup_start_timestamp{job=\"backup\"}", "format": "table", "instant": true, "refId": "C"},
            {"expr": "backup_start_timestamp{job=\"backup\"} * 1000", "format": "table", "instant": true, "refId": "D"},
            {"expr": "(backup_start_timestamp{job=\"backup\"} + backup_duration_seconds{job=\"backup\"}) * 1000", "format": "table", "instant": true, "refId": "E"}
          ],
          "transformations": [
            {
              "id": "joinByField",
              "options": {"byField": "instance", "mode": "outer"}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time 1": true, "Time 2": true, "Time 3": true, "Time 4": true, "Time 5": true,
                  "__name__ 1": true, "__name__ 2": true, "__name__ 3": true, "__name__ 4": true, "__name__ 5": true,
                  "job 1": true, "job 2": true, "job 3": true, "job 4": true, "job 5": true,
                  "exported_instance 1": true, "exported_instance 2": true, "exported_instance 3": true, "exported_instance 4": true, "exported_instance 5": true,
                  "exported_job 1": true, "exported_job 2": true, "exported_job 3": true, "exported_job 4": true, "exported_job 5": true,
                  "container 1": true, "container 2": true, "container 3": true, "container 4": true, "container 5": true,
                  "endpoint 1": true, "endpoint 2": true, "endpoint 3": true, "endpoint 4": true, "endpoint 5": true,
                  "namespace 1": true, "namespace 2": true, "namespace 3": true, "namespace 4": true, "namespace 5": true,
                  "pod 1": true, "pod 2": true, "pod 3": true, "pod 4": true, "pod 5": true,
                  "service 1": true, "service 2": true, "service 3": true, "service 4": true, "service 5": true
                },
                "indexByName": {},
                "renameByName": {
                  "instance": "Host",
                  "status": "Status",
                  "Value #A": "Exit code",
                  "Value #B": "Duration",
                  "Value #C": "Last run age",
                  "Value #D": "Started at",
                  "Value #E": "Finished at"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {"align": "auto", "displayMode": "auto"}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Status"},
                "properties": [
                  {"id": "custom.displayMode", "value": "color-background"},
                  {"id": "mappings", "value": [
                    {"type": "value", "options": {"success": {"color": "green", "text": "OK"}}},
                    {"type": "value", "options": {"failure": {"color": "red", "text": "FAILED"}}}
                  ]}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Duration"},
                "properties": [
                  {"id": "unit", "value": "s"}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Last run age"},
                "properties": [
                  {"id": "unit", "value": "s"},
                  {"id": "custom.displayMode", "value": "color-background"},
                  {"id": "thresholds", "value": {
                    "mode": "absolute",
                    "steps": [
                      {"color": "green", "value": null},
                      {"color": "yellow", "value": 86400},
                      {"color": "red", "value": 93600}
                    ]
                  }}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Started at"},
                "properties": [
                  {"id": "unit", "value": "dateTimeAsIso"}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Finished at"},
                "properties": [
                  {"id": "unit", "value": "dateTimeAsIso"}
                ]
              }
            ]
          },
          "options": {"showHeader": true}
        },
        {
          "type": "timeseries",
          "title": "Backup duration",
          "description": "Duration in seconds of each backup run over time, as reported by `backup_duration_seconds{job=\"backup\"}`. One line per host. Useful for spotting growth in backup size, restic repository slowdowns, or network bottlenecks.",
          "id": 6,
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 13},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "backup_duration_seconds{job=\"backup\"}", "refId": "A", "legendFormat": "{{instance}}"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "right", "showLegend": true, "calcs": ["lastNotNull", "max", "mean"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          }
        },
        {
          "type": "timeseries",
          "title": "Time since last backup",
          "description": "Age of the most recent backup per host, calculated as `time() - backup_start_timestamp`. The red threshold line at 26h matches the staleness limit used by the top-row \"Stale\" stat. restic-retentionpolicies is excluded — it runs once daily and would otherwise dwarf the y-axis for the more frequent backup hosts.",
          "id": 7,
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 22},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "time() - backup_start_timestamp{job=\"backup\",instance!=\"restic-retentionpolicies\"}", "refId": "A", "legendFormat": "{{instance}}"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 5,
                "showPoints": "auto",
                "thresholdsStyle": {"mode": "line"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 93600}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "right", "showLegend": true, "calcs": ["lastNotNull", "max"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          }
        },
        {
          "type": "table",
          "title": "Restore tests",
          "description": "Latest result of the weekly full-fleet restore-test CronJob (apps/backup-script/k8s.restore-test.yaml). Each Sunday every configured tag is restored from the local rest-server to an emptyDir scratch volume and verified. Status is the exit code of restic restore plus the post-restore sanity check (file-existence and SQLite-DB presence checks), joined on the instance label. Last tested shows when the metric was last pushed — a value much older than one week indicates the CronJob is stuck.",
          "id": 8,
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 31},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "backup_restore_status{job=\"backup-restore-test\"}", "format": "table", "instant": true, "refId": "A"},
            {"expr": "backup_restore_duration_seconds{job=\"backup-restore-test\"}", "format": "table", "instant": true, "refId": "B"},
            {"expr": "push_time_seconds{job=\"backup-restore-test\"} * 1000", "format": "table", "instant": true, "refId": "C"}
          ],
          "transformations": [
            {
              "id": "joinByField",
              "options": {"byField": "instance", "mode": "outer"}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time 1": true, "Time 2": true, "Time 3": true,
                  "__name__ 1": true, "__name__ 2": true, "__name__ 3": true,
                  "job 1": true, "job 2": true, "job 3": true,
                  "exported_instance 1": true, "exported_instance 2": true, "exported_instance 3": true,
                  "exported_job 1": true, "exported_job 2": true, "exported_job 3": true,
                  "container 1": true, "container 2": true, "container 3": true,
                  "endpoint 1": true, "endpoint 2": true, "endpoint 3": true,
                  "namespace 1": true, "namespace 2": true, "namespace 3": true,
                  "pod 1": true, "pod 2": true, "pod 3": true,
                  "service 1": true, "service 2": true, "service 3": true,
                  "tag 1": true, "tag 2": true
                },
                "indexByName": {},
                "renameByName": {
                  "instance": "Tag",
                  "Value #A": "Status",
                  "Value #B": "Duration",
                  "Value #C": "Last tested"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {"align": "auto", "displayMode": "auto"}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Status"},
                "properties": [
                  {"id": "custom.displayMode", "value": "color-background"},
                  {"id": "mappings", "value": [
                    {"type": "value", "options": {"0": {"color": "green", "text": "OK"}}},
                    {"type": "range", "options": {"from": 1, "to": 9999, "result": {"color": "red", "text": "FAILED"}}}
                  ]}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Duration"},
                "properties": [
                  {"id": "unit", "value": "s"}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Last tested"},
                "properties": [
                  {"id": "unit", "value": "dateTimeAsIso"}
                ]
              }
            ]
          },
          "options": {"showHeader": true}
        },
        {
          "type": "stat",
          "title": "Wasabi mirror status",
          "description": "Last result of the daily backup-mirror-wasabi CronJob (apps/backup-rest-server/k8s.backup-mirror-wasabi.yaml). 0 means rclone copy from the local rest-server to Wasabi succeeded. The local repo is the source of truth — a failed mirror leaves local intact but freezes the off-site copy.",
          "id": 9,
          "gridPos": {"h": 4, "w": 12, "x": 0, "y": 39},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "backup_mirror_status{job=\"backup-mirror-wasabi\"}", "refId": "A", "legendFormat": "{{status}}"}
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"color": "green", "text": "OK"}}},
                {"type": "range", "options": {"from": 1, "to": 9999, "result": {"color": "red", "text": "FAILED"}}}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "Last Wasabi mirror",
          "description": "Time since the last successful (or failed) push from the backup-mirror-wasabi CronJob to the Pushgateway. The CronJob runs daily at 05:00; values much older than 24 h indicate the job is stuck.",
          "id": 10,
          "gridPos": {"h": 4, "w": 12, "x": 12, "y": 39},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "time() - push_time_seconds{job=\"backup-mirror-wasabi\"}", "refId": "A", "legendFormat": "age"}
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 86400},
                  {"color": "red", "value": 172800}
                ]
              }
            },
            "overrides": []
          }
        }
      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": ["backup", "restic", "pushgateway"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "Prometheus", "value": "Prometheus"},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "queryValue": "",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-7d", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Backups (Restic)",
      "uid": "backup-script",
      "version": 1,
      "weekStart": ""
    }
