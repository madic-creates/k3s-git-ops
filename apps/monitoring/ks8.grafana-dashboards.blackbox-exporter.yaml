# Grafana dashboard for the blackbox-exporter HTTP probes.
# Picked up automatically by the kube-prometheus-stack Grafana sidecar via
# the `grafana_dashboard: "1"` label. The dashboard's own DS_PROMETHEUS
# variable defaults to UID "prometheus" so no manual selection is needed
# on first load; if the cluster's Prometheus datasource has a different
# UID, switch it via the dashboard's variable bar.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-blackbox-exporter
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  blackbox-exporter.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Blackbox exporter HTTP prober dashboard",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
