prometheusOperator:
    revisionHistoryLimit: 2
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:+9xm1NVJiLr9HTN8ymnTIP3oJE3DAbO8Ult66Yq2DbYQXQ==,iv:073jUNvHJi/3SgP3x3R0F1+s83qK6UAyx1xakb0Cb0U=,tag:XPo9iXINdvuSvEJtlXj1sQ==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:OvXqFQtFfn1etw2TNpK743mlS+De3wXJUEgHZT4u2POg5Q==,iv:VC2QBjil7cMPnb44zVo92hUiI0eJfnGvUfmz7GIhJ98=,tag:0GBLIJ8rW1Nuhn+eCcH7Ww==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                - receiver: claude-analyzer
                  matchers:
                    - severity =~ "warning|critical"
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-analyzer
              webhook_configs:
                - url: ENC[AES256_GCM,data:xIJt0gKsUrEiUEsW1f8tF9wtneq5deGWa/+aVtIbBFdS+SR/+08ldGwotfltmZB3PTcu6aO1vUw1ZDGnkpB6Le5fUko9lQ==,iv:Fsikxe+VY7l7nnCmaGLtPMWjsIM9oXqngJJbN0Mp3b0=,tag:NaLSwlzqMK13De8WeQg1Eg==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearers
                        credentials: ENC[AES256_GCM,data:gxFR5kTqnrbSod/T7Tg0sQsJexdgJOdeFbKylXGroEilScOxBnnijbrnnAty/jWkIm9AuqGBkb8JKqQs/EEcWw==,iv:UC9egRYjo1umuFQGalgWxdmYcAcwZ2F/4wdjjpLDnm4=,tag:rJEQXdy3jgw5GV2eh7BkDw==,type:str]
            - name: ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:EHkQOaSqvvvwRyzAFkFQVTHUXuMMBZg560qXNHSFLCwYLNJY+5cI9unPVQsZWXwBFide8PHjAZbCDQ==,iv:PMkAKVe1DFMe3dZiKFOggBT4TdvIPtQZf1G0zacwkSE=,tag:o+GI+PSY+I6mYVv+Kfns0A==,type:str]
                  http_config:
                    basic_auth:
                        username: ENC[AES256_GCM,data:k6cBwCLwXEAvjxIGf/soU58m/AwQGORi,iv:LhJbfnsJdMSmIwdARKzVAp9CeiV6VOihsepNFnn5MB8=,tag:zB35dau2CFVxBOg4C9un8Q==,type:str]
                        password: ENC[AES256_GCM,data:EyACq4t1FiU5POl1Q4P2zVfV7CAzO+fL,iv:3CyeVtTCo3Pemc4T1glzDqYgaTy9OJgvT57jz3VyQcA=,tag:bg0LNe0Qb5yWqDC0kZbgYA==,type:str]
        templates:
            - /etc/alertmanager/config/*.tmpl
prometheus:
    prometheusSpec:
        retention: 45d
        retentionSize: 25GB
        # By default, Prometheus only discovers PodMonitors and ServiceMonitors within its namespace.
        # Settings this to false disables the behaviour.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        #containers:
        #  - name: prometheus
        #    startupProbe:
        #      failureThreshold: 500
        # Resources request and limits
        resources:
            requests:
                cpu: 500m
                memory: 2Gi
            limits:
                cpu: 1000m
                memory: 6Gi
        # PVC configuration
        storageSpec:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 35Gi
# In K3S, these services are not deployed as pods but are part of the k3s binary
# Do not use the vip because there are node specific metrics
kubeEtcd:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
kubeControllerManager:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10257
        targetPort: 10257
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeScheduler:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10259
        targetPort: 10259
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeProxy:
    enabled: false
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10249
        targetPort: 10249
