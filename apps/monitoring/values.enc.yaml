                        password: ENC[AES256_GCM,data:Ba8USGYZe/D1NtOHY3eRht3dhJ0FzKyX,iv:oWhmohr5OMXbjKroJhkAN0naNM0MFvg9DM/VSGuw7/M=,tag:0RQ2is4fKQQJwkm3F8/5bA==,type:str]
            - name: ntfy
