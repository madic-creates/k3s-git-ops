prometheusOperator:
    revisionHistoryLimit: 2
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:E3iypHwWc+RNjWN2d2HSuqRhhfegjeaV8WJWKlqrj7V5/A==,iv:q7ClN+Ya/2zD3rY4iAX1tS1M5xefXbZ/3sfQQ9il5s0=,tag:3Ax2pxhOjEuVXf1aFgj0eA==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:lLh6lqVGNkRLkEutmhkhSc2NT6PXMr8iR8VCwN7PJBVNkQ==,iv:I6kWwFpgz63l3tAxCs30aBc6tmL1QR+FzMIf4Kj8FqE=,tag:t4iRPvHXi1TZT0oIPYw4fA==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                - receiver: claude-and-ntfy
                  matchers:
                    - severity =~ "warning|critical"
                  continue: true
                - receiver: claude-and-ntfy
                  matchers:
                    - alertname = "CPUThrottlingHigh"
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-and-ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:LMtp8UfGALJtN8Qzcn06evMJir5RjMmOVvd4Jlycf9iK1rg2JLsLBfLPNZ3FoAsJS9Q8ntfmNOvKsqPVdo80rql/o5V4Wg==,iv:pPN+wRMh4v4iP99bAzA0tZKSwb+N7iegQq37zPss+2E=,tag:jvjl6oK8FZyTTRBAYji3eA==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearer
                        credentials: ENC[AES256_GCM,data:bXKAhDHT7QAAp+Eo7A8JSLitbh1oNCwewurvxqm+NyDlJvOvw7/Zm8fuK3l3/W6qz6WTgO/KRHw12FgAYk8nxA==,iv:j0R8R9wyxaXCZwHGaFCsGJ9wNHsshdj+HImbHaKlFFg=,tag:SYSnYGEmNnQbjfePSdTRtg==,type:str]
                - url: ENC[AES256_GCM,data:NU85/eBU+mEOuUMy9I9Jnm4OaWZ6DOoKT7eQX/ONn20m2ASEmQOQVPRPh+Ft+OvdO8mDomj7NZWOXQ==,iv:XbocAOVwx1z3ecmYK095L1RDHNO0LC41pHEvGQIZ0Bs=,tag:UybbJSb5+oozgc1UNCnS+Q==,type:str]
                  http_config:
                    basic_auth:
                        username: ENC[AES256_GCM,data:b2L34g0zavR1Uxmz/GpYyEX6GcGcPxn/,iv:VTgmLvfasmmddaTF01SrByoo272BRvApb8iyp3bzoHs=,tag:/H0PfeVmuz171w3Bv/KkxQ==,type:str]
                        password: ENC[AES256_GCM,data:TF9VV/w8smRvCz8eamlLD5OrTjSCOJ6K,iv:9QtJ3E4x2cV55mAt5AD0claMgs0ricSjmvFws+shS7w=,tag:mEE8KWZDgoB4fafitNqIAQ==,type:str]
            - name: ntfy
