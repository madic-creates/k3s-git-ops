prometheusOperator:
    revisionHistoryLimit: 2
# Override "for" / "severity" of built-in rules. Top-level key, not under defaultRules.
customRules:
    # Bump from default severity=info so the alert isn't suppressed by InfoInhibitor.
    CPUThrottlingHigh:
        severity: warning
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:3v9yLBdgpOPqk9ZxQM49zcOugWdbr48Ots02cCJjgDgQDg==,iv:eeUervHt06TSZBEaZRdkgMKMhUfbFmPUgouguiCFDpw=,tag:IzK/adC4XILiVZlYZRj1hQ==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:vtGa5Vodj91218phvkYcRHYLE8D9+/FiB72cbva5Lv5LjA==,iv:HwJdBKKoDpAlQFdlMG/cSqsk+F7WnSGS78uztg/BjjU=,tag:xZPddfg5qGwMyFAPDVUJcw==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                - receiver: claude-and-ntfy
                  matchers:
                    - severity =~ "warning|critical"
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-and-ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:ZAhT9CrXjiQqvD7vq2ps6N20vLigqu9EV3KQ2sybqhuTI6tqJHvW9qmY7VPl4I830/3K3m/7seyDZWNr81DtsCMkMHmTOG6ifFg2wPmvUxJg,iv:UQmkEH6BQg0nEcd8QIGkjIxCD8EN3p+ib3fro6H0lsA=,tag:v1iPs0GvyPUCfMCX530/GQ==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearer
                        credentials: ENC[AES256_GCM,data:Jhz/A9lBaRX45gpBixluxjHCW1LQ+A2KRg74JGsn9AcubjlGcGdAl0nxYrRcQw+B4x+Y9H2NH4jCGTGe4vnenw==,iv:SE/eWbnbnfT/LBY3ltzAlRQ8QOQLSecMuNddED8VSHc=,tag:yKTF/i+sIiWVwcWDqY9UWQ==,type:str]
                - url: ENC[AES256_GCM,data:6J41Lh0SkIqe+cXhPzG9NrP5cskOt0K1v8elUAf/XWzfm5koH9yR7SEr54ikXSXEh762LsItCQ9Exg==,iv:9pmue1WSlT/LiO18EluSRV/XgincaPA1Qe6zX9r2Ifk=,tag:jfopLWPty9E0pVBsw5eGDQ==,type:str]
