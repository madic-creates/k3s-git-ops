prometheusOperator:
    revisionHistoryLimit: 2
# Override "for" / "severity" of built-in rules. Top-level key, not under defaultRules.
customRules:
    # Bump from default severity=info so the alert isn't suppressed by InfoInhibitor.
    CPUThrottlingHigh:
        severity: warning
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:kyPSpyjqwdRbiqP4dqCniLvWh06wbMlff7q8btRSHd5AyA==,iv:iqDvyKx/rmnACZ6PI5T7NVjdmgZ0vImz8jpsLqDun2k=,tag:wSosGpJHL1KZw5RE6u4Yzg==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:1DYIU7rri5vKXoMBT0rsBEKr5j3mX/7ZOirE0mlLL8fKvA==,iv:7CoMZRpbaDhGHu3NkYD7F9Qd5J0UunCsIZY4I/rA69o=,tag:bsIcKGCF8ax6UCEtqA2ocg==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                # group_by override is load-bearing: gives the analyzer its own group
                # state so repeat_interval is per-alert. Without it, sibling alerts in
                # the same namespace would reset the analyzer's 12h cooldown.
                - receiver: claude-analyzer
                  matchers:
                    - severity =~ "warning|critical"
                  group_by:
                    - alertname
                    - namespace
                  group_wait: 30s
                  group_interval: 5m
                  repeat_interval: 12h
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-analyzer
              webhook_configs:
                - url: ENC[AES256_GCM,data:Je7/fXog1wVF25UYgw3Wm40tKFAIOvUfAi7Fl9zoHIwobUv8kjPlTSJSKT22PMkFNKhBbdSBXw7hMn2PU10ruE/gO0Na1g0mtnQbTHbnGyEg,iv:xtCHA6EBkGECkhkLBBs4ORmnqNALNfAywDChrIcMhRI=,tag:fsWfDbaPzSA4WqlyWIQPng==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearer
                        credentials: ENC[AES256_GCM,data:wKxDAS1WNZqi/5yjkX6mJA4hVteQVMDmfsOM6NJzqZ6OG0GQVXNr8IVdlkTdJZJrfRVTkcZSSegGuzhbu9OPmw==,iv:kj+QfgyrsUsNU59vBOTmf6Uc73HFAnNV6yOUNWvwrPA=,tag:WsrFUzHPGD6wtAsXTjkAew==,type:str]
            - name: ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:bP/vAVq/8T4hhzUL0Y3mygWmIRbwWvhx5Eu00eSYM7jkK/A4ajWylIqhD8dn0UsBAJjZHXC76GSQIg==,iv:g6Dtq8cfDc+glo9usiGEr4CtqLgzwiBMcNTxXfzE6y4=,tag:5kFJvRCzz1q7pVnN7mVS5g==,type:str]
                  http_config:
                    basic_auth:
                        username: ENC[AES256_GCM,data:unwml/cQ9c1nkTWO7jVHiUXZ3sa2Q5aO,iv:4oAef0hIUdunLmAG6aIiiQWZ4RPrompjUv6Qk/r9iXM=,tag:GCv21dXMCjMkBmlpbs6G5A==,type:str]
                        password: ENC[AES256_GCM,data:DfEQJj6bFuQg+NQyx6VpPmIJyuyNVDqh,iv:JwPkZ/TwGbloSYGtOa+Ms12Aht07Neu0qWCKzucujaQ=,tag:5hvy5jduWtDVvdchrAn+QA==,type:str]
        templates:
            - /etc/alertmanager/config/*.tmpl
prometheus:
    prometheusSpec:
        retention: 45d
        retentionSize: 25GB
        # By default, Prometheus only discovers PodMonitors and ServiceMonitors within its namespace.
        # Settings this to false disables the behaviour.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        #containers:
        #  - name: prometheus
        #    startupProbe:
        #      failureThreshold: 500
        # Resources request and limits
        resources:
            requests:
                cpu: 500m
                memory: 2Gi
            limits:
                cpu: 1000m
                memory: 6Gi
        # PVC configuration
        storageSpec:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 35Gi
# In K3S, these services are not deployed as pods but are part of the k3s binary
# Do not use the vip because there are node specific metrics
kubeEtcd:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
kubeControllerManager:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10257
        targetPort: 10257
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeScheduler:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10259
        targetPort: 10259
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeProxy:
    enabled: false
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10249
        targetPort: 10249
