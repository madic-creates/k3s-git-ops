prometheusOperator:
    revisionHistoryLimit: 2
defaultRules:
    customRules:
        # Bump from default severity=info so the alert isn't suppressed by InfoInhibitor.
        CPUThrottlingHigh:
            severity: warning
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:Qe4aa+uCmZBpAytxE5gnxKiDz8fVI1LrnXXH2KTVLAfOqg==,iv:fJt18UHWfmpcJGSNaEKqkHUtCG/rpRp5GwXIcyaYYVg=,tag:vSPBJPIJlx73olr8G0H7Og==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:lJ+XMHVHPYx8H4N7kwQFtecBMmm4Zd9LY2//+z89BtCCFg==,iv:XFxDfVpIR0GeAWYN8DiCrzqYX3ASbit9vqEh8F1M//Y=,tag:Pup5I8ReWTMRxVi8sCSFHg==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                - receiver: claude-and-ntfy
                  matchers:
                    - severity =~ "warning|critical"
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-and-ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:hyOmfrQVpWg3Vt6kjowpHE+31xO91t4VLrOT2/Nt2y5IksOAPPv/OpR3DKpLtCI0l58yEHaPQH7fFFav7uGUo76Lu0AMiTk+bud2eLkEJAmD,iv:obhx271CztKMWTZjHWnUJAGd2qQP4aQ9NGzorUeIocw=,tag:940mqd5zyXojvuINbe3XhA==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearer
                        credentials: ENC[AES256_GCM,data:N11yAi7lTTA9YsK8PDIVUTC9nU8S9znw4OECl92CDSK3fp/rg3ZHMryPEdKWhtbdDC5iA4bh4G36sPV1TG4aJQ==,iv:6smVbD42HGs82voJ41UYG38suDU0+lHFs32Wsz+z4rU=,tag:Vi88P2mWHFpg1Z6kWrg+iA==,type:str]
                - url: ENC[AES256_GCM,data:U3v/CngSXnO+ATcN0UpQP4VvrqnpyKGz/6k6gF9lJKYlWpOccYicNYbCTEfcfA9HUQ9hOIcRQExyYQ==,iv:K0Jgmd9EUdsd70XsrKoGrOoGze59OGTapYx3Qu7zcPQ=,tag:cTI9c8p7gcj+Bzq/cwHTQg==,type:str]
