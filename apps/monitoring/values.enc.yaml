prometheusOperator:
    revisionHistoryLimit: 2
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:eWMfON5NXBqemGIy+DnOFyAMnVLjCfxGRDZ3vie+w+O+fw==,iv:FZ0yIqLLq7C/onQV56aVJBM4jkFRMlJtdgXxGjlrDrU=,tag:hLec0ynwJamoDfW3k74IMw==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:SZekDUC4+1Sm5mnEx7ojYAfRePqTVROZQCTQCdZIBJpp+g==,iv:KiVkOFD4Dk4U4TAqPtYs4liiEitE4EG1niLqhBXet0k=,tag:c13W2/lc3NdovjXKXVoClw==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                - receiver: claude-analyzer
                  matchers:
                    - severity =~ "warning|critical"
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-analyzer
              webhook_configs:
                - url: ENC[AES256_GCM,data:d8GeJyPcYcaAxNvAaxw7els9CMADDFQUYIpn+u2z6CKf050uxBn/Nuw5rY37cELsKzg8wc+JZbXCfijEftPJASLjIip7rA==,iv:lYOoCLv60ACtDOwneZ7d1C9UrToATEjHEqO+HLFiSd0=,tag:SrBJ4xiGtGlhrX9Lv/Bn5Q==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearers
                        credentials: ENC[AES256_GCM,data:HKq1pK6ZSCVlKViapzKi4us8w92EEg2ROkYVvwnYRfN1jbhk/2FaAfLkg4IPbMomMv4MyMFXuUUthdkmpPvfDw==,iv:e5jTU/BF3z/XWBevdx6KrbMi4tseyWYAE2MDQnNVWuY=,tag:TV4AErGulpTrfMpUcVasVA==,type:str]
            - name: ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:Vf+Uja/5x4NJd3NZ+M+h5exbqrXg2N4uPbYdb9JQJCAVgbQM26WPAuNJLtsU5CD8XU3+D4wlIaBD2Q==,iv:ECsSN3UwLtgtTkrPYIbORrU3MLnkj4a/V/bTPZmV1X4=,tag:9qEaw56ZUA3CbCaCyRU5cA==,type:str]
                  http_config:
                    basic_auth:
                        username: ENC[AES256_GCM,data:6rGqVCHAme3BO50ToqEH3GXmLKmwoYQO,iv:gfQySuIDF9o94QzwDJSHgJKG79G99MK7nZiDrhm1wzA=,tag:XAx9UJuCRbfL2NHCOdYFkg==,type:str]
                        password: ENC[AES256_GCM,data:JwKi+WiVCUweLdEUBWXKfqw8WgNZ7/PR,iv:2z5lyp+XDRbHmDg+MRzOHsY3djcv2/5DcJuE/KrlOA4=,tag:hRJCNns7Xk5v2kJLV1oEUA==,type:str]
        templates:
            - /etc/alertmanager/config/*.tmpl
prometheus:
    prometheusSpec:
        retention: 45d
        retentionSize: 25GB
        # By default, Prometheus only discovers PodMonitors and ServiceMonitors within its namespace.
        # Settings this to false disables the behaviour.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        #containers:
        #  - name: prometheus
        #    startupProbe:
        #      failureThreshold: 500
        # Resources request and limits
        resources:
            requests:
                cpu: 500m
                memory: 2Gi
            limits:
                cpu: 1000m
                memory: 6Gi
        # PVC configuration
        storageSpec:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 35Gi
# In K3S, these services are not deployed as pods but are part of the k3s binary
# Do not use the vip because there are node specific metrics
kubeEtcd:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
kubeControllerManager:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10257
        targetPort: 10257
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeScheduler:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10259
        targetPort: 10259
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeProxy:
    enabled: false
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10249
        targetPort: 10249
