prometheusOperator:
    revisionHistoryLimit: 2
# Override "for" / "severity" of built-in rules. Top-level key, not under defaultRules.
customRules:
    # Bump from default severity=info so the alert isn't suppressed by InfoInhibitor.
    CPUThrottlingHigh:
        severity: warning
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:yF4vonL7pczC0MozLTE9jRR12KG0MOHCis3PXLHNaQTFHQ==,iv:d6DpxpvYRSHcVQx+S6PUkpa3wXG1B1C5RCmo+6gU0gY=,tag:I41bvOESC3PQwDSg0BBmAw==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:i3DkE0dmJ/u0MoRCVXTxV2jLHc7axERZYk/ZixgKw/vZqw==,iv:E2DumOtwPgzNDcPDb0kCxNnq38sp0ZPU5YgP1OH69UY=,tag:xk3/vZXjtlI64kYR9QeiSw==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                # group_by override is load-bearing: gives the analyzer its own group
                # state so repeat_interval is per-alert. Without it, sibling alerts in
                # the same namespace would reset the analyzer's 12h cooldown.
                - receiver: claude-analyzer
                  matchers:
                    - severity =~ "warning|critical"
                  group_by:
                    - alertname
                    - namespace
                  group_wait: 30s
                  group_interval: 5m
                  repeat_interval: 12h
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-analyzer
              webhook_configs:
                - url: ENC[AES256_GCM,data:li50+iIE07k+ErOyeadeMXeHNVq7zPTWop5G4IB3QWr0AIp1k/bduRUVgmGJpC3SMEA5N25LVM8ohi1p9JZdyXLMkCRjPewRztX2DPrf7qNO,iv:pJmQFBLd6DnlqKmJ42a+3XMEJQW0aX1faU5Bmmu3gnY=,tag:Q/C2qyPblQjaE0jENbyq1w==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearer
                        credentials: ENC[AES256_GCM,data:LAdjJNfc3g+9nYzSXghh1RQVijiF7he+qnDXnmUuA775IddFlb5Wcmlrv6hMwKeNVxmWQKWaUWCKkCcCw4RSrw==,iv:gO0LwWF2JSaUnUu1fIN7bEDB8pibISsExhhB8lPKJlw=,tag:rfRd4OBYIR9Kz35o8dUcVA==,type:str]
            - name: ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:HV4aX+msVyqi5dnEkWBJzRyGnhv3RqGjwpJLUCvaw0xIcQ377NIVsKLTt/IbZjLfiqemk2TcqtxX1Q==,iv:gnqZFTGsbO/LV2Hz7Rwzn9PTWXzBur5zNDg77jElUs4=,tag:tU51wGtwBOpbc8xr5KKEeA==,type:str]
                  http_config:
                    basic_auth:
                        username: ENC[AES256_GCM,data:fL//5QqnmzOw6PLdno/+CzJozQyVF/kd,iv:JesFKsPNVbN3Pdd2yKpJ+FHyNyEDqTp8K5EcaDp2Wk0=,tag:aiNmD8r4pPi66KXDuQBYgA==,type:str]
                        password: ENC[AES256_GCM,data:YDU7ZCvL9a/uqpG8VQYP705LLplBJxcD,iv:lwT0UEi8qChXScs2+1ic/Dbtd8Mj1xm2SCxp5xeYxnY=,tag:SPXtoGSk2MbKfZMQK5WOSA==,type:str]
        templates:
            - /etc/alertmanager/config/*.tmpl
prometheus:
    prometheusSpec:
        retention: 45d
        retentionSize: 25GB
        # By default, Prometheus only discovers PodMonitors and ServiceMonitors within its namespace.
        # Settings this to false disables the behaviour.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        #containers:
        #  - name: prometheus
        #    startupProbe:
        #      failureThreshold: 500
        # Resources request and limits
        resources:
            requests:
                cpu: 500m
                memory: 2Gi
            limits:
                cpu: 1000m
                memory: 6Gi
        # PVC configuration
        storageSpec:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 35Gi
# In K3S, these services are not deployed as pods but are part of the k3s binary
# Do not use the vip because there are node specific metrics
kubeEtcd:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
kubeControllerManager:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10257
        targetPort: 10257
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeScheduler:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10259
        targetPort: 10259
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeProxy:
    enabled: false
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10249
        targetPort: 10249
