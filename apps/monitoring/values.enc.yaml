                        username: ENC[AES256_GCM,data:6/ghHhU9ZWF+N1MvQl+4x0Z3OFfu7NKn,iv:plR7DDI6IlQG49GqJNeVlc3L9Jki0VsoZ/PLJl9g+80=,tag:R0gDgQtJpB+7Ksv9kG3pHQ==,type:str]
                        password: ENC[AES256_GCM,data:jvvbuAyo/66zFioxkOGFRK0ac5b/+u6J,iv:pLndfLos8FMtjHJ7dMksJ/h17vUlDXk6GOvBmJlcNOg=,tag:g92MDxjgZx7VYvLZdTImHw==,type:str]
            - name: ntfy
