prometheusOperator:
    revisionHistoryLimit: 2
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:09QmjUIIrs7mOW4Wtb7hbSSMvdd+e6UNrXw4rIkcmPk0iA==,iv:2F7WFLUEd7w8MckzTuj/RjTtArfrZEwq89twFwHopHU=,tag:Aq+019xHMtYpohRyYFb8TA==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:3CoyE8jHKd2wu0GoksG7ow2HtYSJwqXu4P1jyrgO/cwn5w==,iv:qZT1jQcR9Wv97fIJCMkMpNlZnzFInErO9iVrBU0o8fs=,tag:FweiDOXgURTFknZ8Esax/g==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                - receiver: claude-analyzer
                  matchers:
                    - severity =~ "warning|critical"
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-analyzer
              webhook_configs:
                - url: ENC[AES256_GCM,data:vJb4F3PuukTlKzu2lNotBKWuobZFGl6BDhy3nDjrRKkWHi/o24JATOJNsrNWIG79QUX4fZ59sS7fu3VQ3PVK3GUqhjHtLQ==,iv:E3kDLcbmywNkXsvRdebflr1bHiIbescbbTPTiapwKIo=,tag:81jSmWElSDdXyRQTJtlWJg==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearer
                        credentials: REPLACE_WITH_WEBHOOK_SECRET
            - name: ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:lHpHsp80lXI449FaZWe3iRACoVJtr94Dgl/KPGn3f73hXfx+wraRYIebTuF0evP+NRcH4xSKVvUIrA==,iv:Ja3QbM6sy2l3pI7ltlwpX2xoBMnaG7b/E0hkrr5+rFU=,tag:tc3T+QS3TvaT/Qcv//oZMw==,type:str]
                  http_config:
                    basic_auth:
                        username: ENC[AES256_GCM,data:nwSa1sM4ZmzM7YhWU6Hd2s+LBbfPkZ9p,iv:OChVCacw/ows4JSwWvP6Vf74XnKsHq3gBql0JZpsUZo=,tag:srtJlVNKx3eGp+C8EyBy4g==,type:str]
                        password: ENC[AES256_GCM,data:9QHYhER8tbvaySgN8XskA2n2yHGX3eOe,iv:qiGJjKFJAfa77qDTtT/higySh2ii5NMnqPgrO2JZYBg=,tag:gB9ne+JQnrBp7QWiZDuVPw==,type:str]
        templates:
            - /etc/alertmanager/config/*.tmpl
prometheus:
    prometheusSpec:
        retention: 45d
        retentionSize: 25GB
        # By default, Prometheus only discovers PodMonitors and ServiceMonitors within its namespace.
        # Settings this to false disables the behaviour.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        #containers:
        #  - name: prometheus
        #    startupProbe:
        #      failureThreshold: 500
        # Resources request and limits
        resources:
            requests:
                cpu: 500m
                memory: 2Gi
            limits:
                cpu: 1000m
                memory: 6Gi
        # PVC configuration
        storageSpec:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 35Gi
# In K3S, these services are not deployed as pods but are part of the k3s binary
# Do not use the vip because there are node specific metrics
kubeEtcd:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
kubeControllerManager:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10257
        targetPort: 10257
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeScheduler:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10259
        targetPort: 10259
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeProxy:
    enabled: false
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10249
        targetPort: 10249
