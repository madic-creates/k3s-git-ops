prometheusOperator:
    revisionHistoryLimit: 2
# Override "for" / "severity" of built-in rules. Top-level key, not under defaultRules.
customRules:
    # Bump from default severity=info so the alert isn't suppressed by InfoInhibitor.
    CPUThrottlingHigh:
        severity: warning
alertmanager:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web239,websecure239
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth-authelia@kubernetescrd
        hosts:
            - ENC[AES256_GCM,data:hUIijQ4z0DbnViMITway1seHpMmdxY4C5RrXmX9wKlKk3A==,iv:Vo4VoLshyS3PKadaz1iA6uxMaHRj9pS8ZjBkHPKIpSU=,tag:maOaSSCzgLrhWk6QE9AiLA==,type:str]
        tls:
            - secretName: wildcard-cloudflare-production-02
              hosts:
                - ENC[AES256_GCM,data:Mu0npV6I4eOR/0WLalNfo9hoMh76odtA4jNaqM6myMiMaQ==,iv:SYrZhySdyzEtLI//ygNNJ5kmRD46f8Ltzsy6Nk6Ouj0=,tag:5i5iy0LW+EnFPzgGioUaOA==,type:str]
    alertmanagerSpec:
        # PVC configuration
        storage:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 1Gi
    config:
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
            - target_matchers:
                - alertname = InfoInhibitor
        route:
            group_by:
                - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 1h
            receiver: ntfy
            routes:
                - receiver: "null"
                  matchers:
                    - alertname = "InfoInhibitor"
                # group_by override is load-bearing: gives the analyzer its own group
                # state so repeat_interval is per-alert. Without it, sibling alerts in
                # the same namespace would reset the analyzer's 12h cooldown.
                - receiver: claude-analyzer
                  matchers:
                    - severity =~ "warning|critical"
                  group_by:
                    - alertname
                    - namespace
                  group_wait: 30s
                  group_interval: 5m
                  repeat_interval: 12h
                  continue: true
                - receiver: ntfy
                  repeat_interval: 6h
                  matchers:
                    - alertname = "Watchdog"
        receivers:
            - name: "null"
            - name: claude-analyzer
              webhook_configs:
                - url: ENC[AES256_GCM,data:tlShxNq0apJgprtLelqVF8BYng2MIek4MC5ScB/egDs4bJaLZuOX6kpkCAgtIfUJht30F9GvfzZjBccvTf/wVTYel5W7h4Q5q7yDf9QFMppJ,iv:2sPYCrQHo73Wfz7SEsG22Tnkk7kOTpYNG1+dRhB91J4=,tag:bppsMJGL3TQwdP5lhbXu6g==,type:str]
                  send_resolved: false
                  http_config:
                    authorization:
                        type: Bearer
                        credentials: ENC[AES256_GCM,data:697brnJqTB8uuSkxDlTTZKl6DRnQ0wXQpghtL6Q6xJu8AenI3fN7v4k6A7VZfs1HTHSW8fYr35wZjDWeKqxbzA==,iv:JC70zpNEOhDt5401O/D1Uh1ODo9V4FPjWmgc/VcpljY=,tag:7S9OdZJ/nhkMOEry4JRaiQ==,type:str]
            - name: ntfy
              webhook_configs:
                - url: ENC[AES256_GCM,data:oamzAml2SxLD3Yg2eXbOFM04+fWmBUSeF5PYuzty+TQaN0L7gvXKx+n/U9hGMxORHWXf3l0jck5pEQ==,iv:GIDJ1qz2Y2C3oi7g6WzV+0uduyh1ruWFfg/DxgcnwsE=,tag:pWFYWa/4Qsy/Nh1ufE39wg==,type:str]
                  http_config:
                    basic_auth:
                        username: ENC[AES256_GCM,data:RaXolxrwrDNnWp4et82fQSjGSSLR29PZ,iv:Z03WPAdri5H1R4vPmp8VFjF3Y1E5xJqIuV8a0URoGjs=,tag:JrWxJD9AujqpORDroDa7DQ==,type:str]
                        password: ENC[AES256_GCM,data:orYPW3qNyOG+LEJvCZHB5hI1d8x6dDHP,iv:lbHYLSBhnRFNbBFJvG/NRVHmacwUx7ZYVTCEHLb5p7E=,tag:TZwjTLVIXeD0h1ZV3c5rSg==,type:str]
        templates:
            - /etc/alertmanager/config/*.tmpl
prometheus:
    prometheusSpec:
        retention: 45d
        retentionSize: 25GB
        # By default, Prometheus only discovers PodMonitors and ServiceMonitors within its namespace.
        # Settings this to false disables the behaviour.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        #containers:
        #  - name: prometheus
        #    startupProbe:
        #      failureThreshold: 500
        # Resources request and limits
        resources:
            requests:
                cpu: 500m
                memory: 2Gi
            limits:
                cpu: 1000m
                memory: 6Gi
        # PVC configuration
        storageSpec:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 35Gi
# In K3S, these services are not deployed as pods but are part of the k3s binary
# Do not use the vip because there are node specific metrics
kubeEtcd:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
kubeControllerManager:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10257
        targetPort: 10257
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeScheduler:
    enabled: true
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10259
        targetPort: 10259
    serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
kubeProxy:
    enabled: false
    endpoints:
        - 192.168.1.21
        - 192.168.1.22
        - 192.168.1.23
    service:
        enabled: true
        port: 10249
        targetPort: 10249
