apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-alert-analyzer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: claude-alert-analyzer
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  strategy:
    type: Recreate  # Prevent overlapping pods fighting over token rotation
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-alert-analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-alert-analyzer
    spec:
      serviceAccountName: claude-alert-analyzer
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        # Main analyzer
        - name: analyzer
          image: ghcr.io/madic-creates/claude-alert-analyzer:dad906a
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: claude-alert-analyzer-env
          env:
            - name: PORT
              value: "8080"
            - name: PROMETHEUS_URL
              value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
            - name: CLAUDE_MODEL
              value: "claude-sonnet-4-6"
            - name: CLAUDE_MODEL_CRITICAL
              value: "claude-opus-4-6"
            - name: COOLDOWN_SECONDS
              value: "300"
            - name: ALLOWED_NAMESPACES
              value: "monitoring,databases,media,kube-system"
            - name: MAX_LOG_BYTES
              value: "2048"
          volumeMounts:
            - name: claude-credentials
              mountPath: /etc/claude-credentials
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10

        # Token-sync sidecar: patches refreshed token from /tmp back to K8s Secret
        - name: token-sync
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "token-sync sidecar starting (interval: 60s)"
              while true; do
                sleep 60
                if [ -f /tmp/claude-credentials.json ]; then
                  LIVE_TOKEN=$(cat /tmp/claude-credentials.json | base64 -w0)
                  CURRENT=$(kubectl get secret claude-alert-analyzer-credentials \
                    -n monitoring -o jsonpath='{.data.credentials\.json}' 2>/dev/null)
                  if [ "$LIVE_TOKEN" != "$CURRENT" ] && [ -n "$LIVE_TOKEN" ]; then
                    kubectl patch secret claude-alert-analyzer-credentials \
                      -n monitoring --type=merge \
                      -p "{\"data\":{\"credentials.json\":\"${LIVE_TOKEN}\"}}" \
                      && echo "[$(date -Iseconds)] token synced to Secret" \
                      || echo "[$(date -Iseconds)] token sync failed"
                  fi
                fi
              done
          volumeMounts:
            - name: tmp
              mountPath: /tmp
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: claude-credentials
          secret:
            secretName: claude-alert-analyzer-credentials
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
