apiVersion: apps/v1
kind: Deployment
metadata:
  name: tamagotchi
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tamagotchi
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tamagotchi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tamagotchi
    spec:
      serviceAccountName: tamagotchi
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tamagotchi
          image: ghcr.io/madic-creates/tamagotchi:latest@sha256:e351ddbb03a651cb0cc82b520a726b029f6d3a279a9de702a0e3574e3c294466
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: PROMETHEUS_URL
              value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
            # argocd-server runs with server.insecure=true (Helm default), so plain HTTP.
            - name: ARGOCD_URL
              value: "http://argocd-server.argocd.svc.cluster.local"
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tamagotchi-env
                  key: ARGOCD_TOKEN
            # Required for the one-shot self-pod GET that resolves the pet's birthday.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Liveness uses TCP socket: "is the process alive and listening". /healthz
          # would 503 during sustained upstream outages and trigger restarts.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          # Readiness uses /healthz so traffic is removed from the Service when polls
          # are stale; the pod stays alive and recovers when polls succeed again.
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
