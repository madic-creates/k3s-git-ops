apiVersion: v1
kind: ServiceAccount
metadata:
  name: tamagotchi
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
# Cluster-wide read for nodes (Ready-state mood signal) and cert-manager
# Certificates (cert-expiry mood signal). Everything else (ArgoCD apps,
# Longhorn volumes via Prometheus, pod-restart deltas via Prometheus) goes
# through external APIs and needs no Kubernetes RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tamagotchi
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tamagotchi
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tamagotchi
subjects:
  - kind: ServiceAccount
    name: tamagotchi
    namespace: monitoring
---
# Namespace-scoped get on Pods for the one-shot self-pod read at startup
# (resolves creationTimestamp for the displayed pet age).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tamagotchi-self-pod
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tamagotchi-self-pod
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tamagotchi-self-pod
subjects:
  - kind: ServiceAccount
    name: tamagotchi
    namespace: monitoring
