---
resources:
  - namespace.yaml
  - k8s.smb.yaml
  - k8s.np.paperless-ngx.yaml
  - k8s.backup-cronjob.yaml

generators:
  - kustomize-secret-generator.yaml

namespace: paper

commonAnnotations:
  argocd.argoproj.io/sync-wave: "40"

helmCharts:
  - name: paperless
    repo: https://charts.pascaliske.dev
    version: 7.0.0
    releaseName: paperless
    namespace: paper
    includeCRDs: true
    valuesFile: values.public.yaml

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: paperless
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: paperless
        namespace: paper
      spec:
        revisionHistoryLimit: 2
        strategy:
          type: Recreate
        template:
          spec:
            containers:
              - name: paperless
                envFrom:
                  - secretRef:
                      name: paperless-env-secrets
