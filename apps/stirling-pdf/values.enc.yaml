# nameOverride keeps the selector label app.kubernetes.io/name=stirling-pdf
# (chart default would be "stirling-pdf-chart"). Required so the existing
# CiliumNetworkPolicy selector keeps matching the pods.
nameOverride: stirling-pdf
fullnameOverride: stirling-pdf
# Authelia handles authentication via Traefik ForwardAuth middleware,
# so Stirling's own login is disabled.
envs:
    - name: DOCKER_ENABLE_SECURITY
      value: "false"
    - name: SECURITY_ENABLELOGIN
      value: "false"
    - name: LANGS
      value: en_GB,de_DE
    - name: SYSTEM_DEFAULTLOCALE
      value: de-DE
resources:
    requests:
        cpu: 500m
        memory: 1Gi
    limits:
        cpu: 4000m
        memory: 4Gi
service:
    type: ClusterIP
    externalPort: 80
    # Empty targetPort -> service routes to container's "http" named port (8080)
# Ingress is managed via the SOPS-encrypted ingress.enc.yaml.
ingress:
    enabled: false
# Stateless deployment - no persistent storage.
persistence:
    enabled: false
# We don't scrape Stirling-PDF metrics today.
serviceMonitor:
    enabled: false
