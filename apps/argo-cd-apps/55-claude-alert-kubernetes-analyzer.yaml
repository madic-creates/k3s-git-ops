apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-alert-kubernetes-analyzer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "55"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "example.com"
    targetRevision: main
    path: apps/claude-alert-kubernetes-analyzer
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # Allow scaling the deployment manually (e.g. to 0) without ArgoCD reverting it
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: claude-alert-kubernetes-analyzer
      namespace: monitoring
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      # Required so ignoreDifferences is also honoured during sync, not only in the diff view
      - RespectIgnoreDifferences=true
