apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-alert-kubernetes-analyzer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "55"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "example.com"
    targetRevision: main
    path: apps/claude-alert-kubernetes-analyzer
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
