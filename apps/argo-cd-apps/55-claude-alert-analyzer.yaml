apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-alert-analyzer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "55"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "example.com"
    targetRevision: main
    path: apps/claude-alert-analyzer
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # Prevent selfHeal from reverting sidecar token patches
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: claude-alert-analyzer-credentials
      jsonPointers:
        - /data/credentials.json
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
