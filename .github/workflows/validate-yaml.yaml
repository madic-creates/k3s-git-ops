---
name: YAML Lint

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/validate-yaml.yaml"
  workflow_dispatch:
    inputs:
      app:
        description: "App to validate (e.g. 'authelia'). Leave empty to validate all apps."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ${{ inputs.app && format('apps/{0}/', inputs.app) || 'apps/' }}
          config_data: |
            extends: default
            ignore-from-file: .yamllintignore
            rules:
              indentation: disable
              line-length: disable
              truthy:
                check-keys: false
              comments:
                min-spaces-from-content: 1
                require-starting-space: false
              comments-indentation: disable
              document-start: disable
