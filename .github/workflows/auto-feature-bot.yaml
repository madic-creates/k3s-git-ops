name: Auto Feature Bot

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  auto-improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude via OpenRouter
        uses: anthropics/claude-code-action@beta
        env:
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: 1
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          mode: agent
          prompt: |
            Analyze this codebase and immediately add ONE small, useful feature or bugfix.
            Do not ask questions. Do not wait for input.
            
            Steps to execute now:
            1. Pick a file or argocd app to improve
            2. Add one small, useful feature to it
            3. Create a new branch: feature/auto-$(date +%s)
            4. Commit the change
            5. Open a pull request with title and description of what was added and why
