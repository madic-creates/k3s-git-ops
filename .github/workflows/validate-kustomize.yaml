---
name: Validate Kustomize Builds

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/validate-kustomize.yaml"
  workflow_dispatch:
    inputs:
      app:
        description: "App to validate (e.g. 'authelia'). Leave empty to validate all apps."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changed.outputs.apps }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect apps to validate
        id: changed
        run: |
          if [ -n "${{ inputs.app }}" ]; then
            changed_apps=$(echo '["${{ inputs.app }}"]')
          else
            changed_apps=$(git diff --name-only HEAD~1 HEAD -- apps/ \
              | cut -d'/' -f2 \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "apps=$changed_apps" >> "$GITHUB_OUTPUT"
          echo "Apps to validate: $changed_apps"

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate kustomize build for ${{ matrix.app }}
        run: |
          app_dir="apps/${{ matrix.app }}"
          if [ ! -f "$app_dir/kustomization.yaml" ]; then
            echo "No kustomization.yaml in $app_dir, skipping"
            exit 0
          fi
          echo "Building $app_dir ..."
          kustomize build "$app_dir" --enable-helm 2>&1
