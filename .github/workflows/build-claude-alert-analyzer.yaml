---
name: Build claude-alert-analyzer

on:
  push:
    branches: [main]
    paths:
      - "apps/claude-alert-analyzer/src/**"
      - "apps/claude-alert-analyzer/Dockerfile"
      - ".github/workflows/build-claude-alert-analyzer.yaml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/claude-alert-analyzer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own image-tag commit
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag from short SHA
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/claude-alert-analyzer
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.sha_short }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment image tag
        run: |
          sed -i "s|image: ${{ env.IMAGE }}:.*|image: ${{ env.IMAGE }}:${{ steps.tag.outputs.sha_short }}|" \
            apps/claude-alert-analyzer/k8s.deployment.yaml

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/claude-alert-analyzer/k8s.deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(claude-alert-analyzer): update image tag to ${{ steps.tag.outputs.sha_short }}"
          git push
